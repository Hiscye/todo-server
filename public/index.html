<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代办清单 · v1.3.0</title>
    <style>
        /* ========================================
           🎨 设计系统 (Design System)
           ======================================== */
        :root {
            --c-bg: #f5f5f7;
            --c-surface: #ffffff;
            --c-surface-2: #fafafc;
            --c-border: #e5e7eb;
            --c-border-strong: #d1d5db;
            --c-text: #111827;
            --c-text-2: #4b5563;
            --c-text-3: #9ca3af;
            --c-text-inv: #ffffff;
            --c-primary: #6366f1;
            --c-primary-hover: #4f46e5;
            --c-primary-soft: #eef2ff;
            --c-success: #10b981;
            --c-warning: #f59e0b;
            --c-danger: #ef4444;
            --c-danger-soft: #fee2e2;
            --c-prio-high: #ef4444;
            --c-prio-high-bg: #fef2f2;
            --c-prio-medium: #f59e0b;
            --c-prio-medium-bg: #fffbeb;
            --c-prio-low: #10b981;
            --c-prio-low-bg: #f0fdf4;
            --c-overdue: #dc2626;
            --c-today: #ea580c;
            --c-soon: #ca8a04;
            --c-upcoming: #16a34a;
            --c-future: #6b7280;
            --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
            --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
            --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
            --r-full: 9999px;
            --sh-sm: 0 1px 2px rgba(0,0,0,0.05);
            --sh-md: 0 4px 12px rgba(0,0,0,0.08);
            --sh-lg: 0 10px 30px rgba(0,0,0,0.10);
            --sh-xl: 0 25px 60px rgba(0,0,0,0.15);
            --ff: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            --t-fast: 0.15s ease;
            --t-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --t-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: var(--ff);
            color: var(--c-text);
            background: linear-gradient(135deg, #e0e7ff 0%, #fce7f3 50%, #dbeafe 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: var(--sp-6) var(--sp-4);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input, textarea, select { font-family: inherit; outline: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: var(--r-full); }
        ::-webkit-scrollbar-thumb:hover { background: var(--c-border-strong); }

        .app { max-width: 760px; margin: 0 auto; }

        .header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--r-xl);
            padding: var(--sp-5) var(--sp-6);
            margin-bottom: var(--sp-5);
            box-shadow: var(--sh-md);
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            flex-wrap: wrap;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            color: var(--c-text);
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--c-primary), #8b5cf6);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .header-spacer { flex: 1; }
        .header-actions { display: flex; align-items: center; gap: var(--sp-2); }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--c-text-2);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--c-border);
            transition: all var(--t-fast);
            font-size: 16px;
        }
        .icon-btn:hover { background: white; color: var(--c-primary); transform: translateY(-1px); box-shadow: var(--sh-sm); }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--r-full);
            font-size: 12px;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--c-border);
            cursor: pointer;
            transition: all var(--t-fast);
        }
        .connection-badge:hover { background: white; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--c-warning);
            transition: background var(--t-fast);
        }
        .connection-badge.connected .status-dot { background: var(--c-success); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
        .connection-badge.connecting .status-dot { background: var(--c-warning); animation: pulseDot 1.2s infinite; }
        .connection-badge.disconnected .status-dot { background: var(--c-danger); }
        @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--sp-3);
            margin-bottom: var(--sp-5);
        }
        @media (max-width: 600px) { .dashboard { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--r-lg);
            padding: var(--sp-4);
            box-shadow: var(--sh-sm);
            transition: all var(--t-base);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }
        .stat-icon { font-size: 18px; margin-bottom: var(--sp-1); }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--c-text); line-height: 1.2; }
        .stat-label { font-size: 12px; color: var(--c-text-3); margin-top: 2px; }
        .stat-card.success .stat-value { color: var(--c-success); }
        .stat-card.warning .stat-value { color: var(--c-warning); }
        .stat-card.danger .stat-value { color: var(--c-danger); }

        .add-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--r-xl);
            padding: var(--sp-4);
            margin-bottom: var(--sp-4);
            box-shadow: var(--sh-md);
            transition: all var(--t-base);
        }
        .add-card:focus-within { box-shadow: var(--sh-lg), 0 0 0 3px var(--c-primary-soft); }
        .add-row { display: flex; gap: var(--sp-2); align-items: center; }
        .add-input {
            flex: 1; border: none; background: transparent;
            font-size: 15px; color: var(--c-text);
            padding: var(--sp-2) var(--sp-3);
        }
        .add-input::placeholder { color: var(--c-text-3); }
        .add-meta {
            display: flex; gap: var(--sp-2);
            margin-top: var(--sp-3); padding-top: var(--sp-3);
            border-top: 1px dashed var(--c-border);
            flex-wrap: wrap; align-items: center;
        }
        .add-meta-label { font-size: 12px; color: var(--c-text-3); margin-right: var(--sp-1); }
        .chip-group { display: inline-flex; gap: 4px; }
        .chip {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: var(--r-full);
            background: var(--c-surface-2);
            color: var(--c-text-2);
            border: 1px solid var(--c-border);
            transition: all var(--t-fast);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .chip:hover { background: white; }
        .chip.active { background: var(--c-primary); color: white; border-color: var(--c-primary); }
        .chip.prio-high.active { background: var(--c-prio-high); border-color: var(--c-prio-high); }
        .chip.prio-medium.active { background: var(--c-prio-medium); border-color: var(--c-prio-medium); }
        .chip.prio-low.active { background: var(--c-prio-low); border-color: var(--c-prio-low); }
        .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
        .chip.prio-high .chip-dot { background: var(--c-prio-high); }
        .chip.prio-medium .chip-dot { background: var(--c-prio-medium); }
        .chip.prio-low .chip-dot { background: var(--c-prio-low); }
        .chip.active .chip-dot { background: white; }
        .chip-date {
            border: 1px solid var(--c-border);
            padding: 3px 8px;
            border-radius: var(--r-sm);
            font-size: 12px;
            background: white;
            color: var(--c-text-2);
        }
        .add-submit {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--c-primary), #8b5cf6);
            color: white;
            border-radius: var(--r-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all var(--t-fast);
        }
        .add-submit:hover:not(:disabled) { transform: translateY(-1px) scale(1.05); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); }
        .add-submit:disabled { background: var(--c-border); box-shadow: none; cursor: not-allowed; }

        .toolbar {
            display: flex; align-items: center; gap: var(--sp-3);
            margin-bottom: var(--sp-4); flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 200px; }
        .search-input {
            width: 100%;
            padding: var(--sp-2) var(--sp-3) var(--sp-2) 36px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--c-border);
            border-radius: var(--r-full);
            font-size: 13px;
            color: var(--c-text);
            transition: all var(--t-fast);
        }
        .search-input:focus { background: white; border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-soft); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--c-text-3); font-size: 14px; pointer-events: none; }
        .filter-tabs {
            display: flex; background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--c-border);
            border-radius: var(--r-full);
            padding: 3px; gap: 2px;
        }
        .filter-tab {
            padding: 5px 12px; font-size: 12px;
            color: var(--c-text-2);
            border-radius: var(--r-full);
            transition: all var(--t-fast);
            white-space: nowrap;
        }
        .filter-tab:hover { color: var(--c-text); }
        .filter-tab.active { background: white; color: var(--c-primary); font-weight: 600; box-shadow: var(--sh-sm); }

        .todo-list { list-style: none; display: flex; flex-direction: column; gap: var(--sp-2); }
        .todo-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: var(--sh-sm);
            transition: all var(--t-base);
            animation: cardIn var(--t-slow) ease;
        }
        .todo-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
        .todo-card.expanded { box-shadow: var(--sh-md); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .todo-card.priority-high { border-left: 4px solid var(--c-prio-high); }
        .todo-card.priority-medium { border-left: 4px solid var(--c-prio-medium); }
        .todo-card.priority-low { border-left: 4px solid var(--c-prio-low); }

        .todo-main {
            display: flex; align-items: center; gap: var(--sp-3);
            padding: var(--sp-4); cursor: pointer;
        }
        .todo-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--c-primary); flex-shrink: 0; }
        .todo-body { flex: 1; min-width: 0; }
        .todo-text { font-size: 15px; color: var(--c-text); font-weight: 500; word-break: break-word; }
        .todo-card.completed .todo-text { text-decoration: line-through; color: var(--c-text-3); }
        .todo-meta { display: flex; gap: var(--sp-2); margin-top: 6px; flex-wrap: wrap; align-items: center; }
        .meta-pill {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; font-size: 11px;
            border-radius: var(--r-full);
            font-weight: 500;
        }
        .meta-pill.prio-high { background: var(--c-prio-high-bg); color: var(--c-prio-high); }
        .meta-pill.prio-medium { background: var(--c-prio-medium-bg); color: var(--c-prio-medium); }
        .meta-pill.prio-low { background: var(--c-prio-low-bg); color: var(--c-prio-low); }
        .meta-pill.due-overdue { background: var(--c-danger-soft); color: var(--c-overdue); font-weight: 600; }
        .meta-pill.due-today { background: #ffedd5; color: var(--c-today); font-weight: 600; }
        .meta-pill.due-soon { background: #fef9c3; color: var(--c-soon); }
        .meta-pill.due-upcoming { background: #dcfce7; color: var(--c-upcoming); }
        .meta-pill.due-future { color: var(--c-future); background: transparent; }
        .meta-pill.subtask { background: var(--c-primary-soft); color: var(--c-primary); }
        .meta-pill.desc { background: var(--c-surface-2); color: var(--c-text-2); }
        .meta-pill.attach { background: var(--c-surface-2); color: var(--c-text-2); }
        .meta-author { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--c-text-3); }
        .meta-author .avatar {
            width: 16px; height: 16px;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 9px; font-weight: 700;
        }
        .meta-author.completed { color: var(--c-success); font-weight: 500; }

        .todo-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .todo-action-btn {
            width: 28px; height: 28px;
            border-radius: var(--r-sm);
            color: var(--c-text-3);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all var(--t-fast);
        }
        .todo-action-btn:hover { background: var(--c-surface-2); color: var(--c-text); }
        .todo-action-btn.danger:hover { background: var(--c-danger-soft); color: var(--c-danger); }
        .todo-expand-icon {
            color: var(--c-text-3); font-size: 12px;
            transition: transform var(--t-base);
            display: inline-block;
            padding: 0 4px;
        }
        .todo-card.expanded .todo-expand-icon { transform: rotate(180deg); }

        .todo-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--t-slow);
            background: var(--c-surface-2);
            border-top: 1px solid transparent;
        }
        .todo-card.expanded .todo-details { max-height: 800px; border-top-color: var(--c-border); }
        .todo-details-inner { padding: var(--sp-4) var(--sp-4) var(--sp-4) 50px; }
        .detail-section { margin-bottom: var(--sp-4); }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-label {
            font-size: 11px; color: var(--c-text-3);
            text-transform: uppercase; letter-spacing: 0.5px;
            font-weight: 600; margin-bottom: 6px;
        }
        .detail-textarea {
            width: 100%; min-height: 70px;
            padding: var(--sp-3);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            font-size: 13px; resize: vertical;
            background: white; color: var(--c-text);
            transition: border-color var(--t-fast);
        }
        .detail-textarea:focus { border-color: var(--c-primary); }

        .subtask-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .subtask-item {
            display: flex; align-items: center; gap: var(--sp-2);
            padding: 6px 8px; border-radius: var(--r-sm);
            transition: background var(--t-fast);
        }
        .subtask-item:hover { background: white; }
        .subtask-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--c-primary); flex-shrink: 0; }
        .subtask-text { flex: 1; font-size: 13px; color: var(--c-text-2); }
        .subtask-item.done .subtask-text { text-decoration: line-through; color: var(--c-text-3); }
        .subtask-remove {
            opacity: 0; color: var(--c-text-3); font-size: 12px;
            padding: 2px 4px; border-radius: 4px;
            transition: opacity var(--t-fast);
        }
        .subtask-item:hover .subtask-remove { opacity: 1; }
        .subtask-remove:hover { background: var(--c-danger-soft); color: var(--c-danger); }
        .subtask-add { display: flex; gap: var(--sp-2); margin-top: 6px; align-items: center; }
        .subtask-input {
            flex: 1; padding: 6px 10px;
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            font-size: 12px; background: white;
        }
        .subtask-input:focus { border-color: var(--c-primary); }
        .subtask-add-btn { padding: 6px 10px; background: var(--c-primary); color: white; border-radius: var(--r-sm); font-size: 12px; }
        .subtask-progress {
            display: inline-block; padding: 1px 8px;
            background: var(--c-primary-soft); color: var(--c-primary);
            border-radius: var(--r-full); font-size: 10px; font-weight: 700;
        }
        .subtask-progress.done { background: var(--c-success); color: white; }

        .attach-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .attach-item {
            display: flex; align-items: center; gap: var(--sp-2);
            padding: 4px 8px; border-radius: var(--r-sm);
            font-size: 12px; color: var(--c-primary);
            text-decoration: none; background: white;
            border: 1px solid var(--c-border);
            transition: all var(--t-fast);
        }
        .attach-item:hover { background: var(--c-primary-soft); border-color: var(--c-primary); }
        .attach-icon { flex-shrink: 0; }
        .attach-remove { margin-left: auto; color: var(--c-text-3); padding: 0 4px; font-size: 11px; }
        .attach-remove:hover { color: var(--c-danger); }
        .attach-input-row { display: flex; gap: 4px; margin-top: 4px; }
        .attach-input {
            flex: 1; padding: 6px 10px;
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            font-size: 12px; background: white;
        }
        .attach-input:focus { border-color: var(--c-primary); }
        .attach-add-btn { padding: 6px 10px; background: var(--c-primary); color: white; border-radius: var(--r-sm); font-size: 12px; }

        .online-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--r-lg);
            padding: var(--sp-3) var(--sp-4);
            margin-bottom: var(--sp-4);
            box-shadow: var(--sh-sm);
        }
        .online-title {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--c-text-2);
            font-weight: 600; margin-bottom: var(--sp-2);
        }
        .online-pulse {
            width: 8px; height: 8px; background: var(--c-success);
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            animation: pulseGreen 1.6s infinite;
        }
        @keyframes pulseGreen {
            0%, 100% { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.05); }
        }
        .online-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .online-user {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px 4px 4px; background: white;
            border-radius: var(--r-full);
            border: 1px solid var(--c-border);
            font-size: 12px; color: var(--c-text);
            transition: all var(--t-fast);
            cursor: help;
        }
        .online-user:hover { transform: translateY(-1px); box-shadow: var(--sh-sm); }
        .online-user .avatar {
            width: 22px; height: 22px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 11px; font-weight: 700;
        }
        .online-user .me-tag {
            background: var(--c-primary); color: white;
            font-size: 9px; padding: 1px 5px;
            border-radius: var(--r-full); margin-left: 2px; font-weight: 700;
        }
        .online-empty { color: var(--c-text-3); font-size: 12px; padding: 4px 0; }

        .empty-state { text-align: center; padding: var(--sp-10) var(--sp-6); color: var(--c-text-3); }
        .empty-illustration { font-size: 64px; margin-bottom: var(--sp-3); opacity: 0.6; }
        .empty-title { font-size: 16px; color: var(--c-text-2); margin-bottom: var(--sp-2); font-weight: 500; }
        .empty-hint { font-size: 13px; color: var(--c-text-3); }

        .toast-container {
            position: fixed; top: 20px; right: 20px;
            z-index: 9999;
            display: flex; flex-direction: column;
            gap: var(--sp-2);
            pointer-events: none;
        }
        .toast {
            background: white; border-radius: var(--r-md);
            padding: var(--sp-3) var(--sp-4);
            box-shadow: var(--sh-lg);
            display: flex; align-items: center; gap: var(--sp-3);
            min-width: 280px; max-width: 400px;
            pointer-events: auto;
            border-left: 4px solid var(--c-primary);
            animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.success { border-left-color: var(--c-success); }
        .toast.error { border-left-color: var(--c-danger); }
        .toast.info { border-left-color: var(--c-primary); }
        .toast-icon { font-size: 18px; flex-shrink: 0; }
        .toast.success .toast-icon { color: var(--c-success); }
        .toast.error .toast-icon { color: var(--c-danger); }
        .toast-body { flex: 1; }
        .toast-title { font-size: 13px; font-weight: 600; color: var(--c-text); }
        .toast-msg { font-size: 12px; color: var(--c-text-2); margin-top: 1px; }
        .toast-action {
            font-size: 12px; color: var(--c-primary);
            font-weight: 600; padding: 2px 8px;
            border-radius: var(--r-sm);
            background: var(--c-primary-soft);
        }
        .toast-close { color: var(--c-text-3); padding: 0 4px; font-size: 16px; }
        .toast.removing { animation: toastOut 0.3s forwards; }
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center;
            z-index: 100; padding: 20px;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: white; border-radius: var(--r-xl);
            padding: var(--sp-6); width: 100%; max-width: 460px;
            box-shadow: var(--sh-xl);
            animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn { from { transform: scale(0.95) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .modal h3 { font-size: 18px; color: var(--c-text); margin-bottom: var(--sp-2); }
        .modal p { font-size: 13px; color: var(--c-text-2); margin-bottom: var(--sp-3); line-height: 1.6; }
        .modal p code { background: var(--c-surface-2); padding: 2px 6px; border-radius: var(--r-sm); font-size: 12px; color: var(--c-primary); }
        .modal input {
            width: 100%; padding: var(--sp-3);
            border: 2px solid var(--c-border);
            border-radius: var(--r-md);
            font-size: 14px; margin-bottom: var(--sp-3);
            transition: border-color var(--t-fast);
        }
        .modal input:focus { border-color: var(--c-primary); }
        .modal-section { margin-bottom: var(--sp-4); }
        .modal-section-label { display: block; font-size: 13px; font-weight: 600; color: var(--c-text); margin-bottom: 6px; }
        .modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
        .modal-btn { padding: var(--sp-2) var(--sp-4); border-radius: var(--r-md); font-size: 14px; font-weight: 500; transition: all var(--t-fast); }
        .modal-btn.primary { background: var(--c-primary); color: white; }
        .modal-btn.primary:hover { background: var(--c-primary-hover); }
        .modal-btn.secondary { background: var(--c-surface-2); color: var(--c-text-2); }
        .modal-btn.secondary:hover { background: var(--c-border); }

        .modal-overlay.required .modal { border: 2px solid var(--c-danger); }
        .modal-overlay.required .modal h3::after { content: ' *必填'; color: var(--c-danger); font-size: 13px; font-weight: normal; }
        .modal.required-mode .modal-btn.secondary { display: none; }

        .add-card.locked,
        .toolbar.locked { opacity: 0.5; pointer-events: none; }
        .name-required-banner {
            display: none;
            background: var(--c-danger-soft);
            border: 1px solid var(--c-danger);
            color: var(--c-danger);
            padding: var(--sp-3) var(--sp-4);
            border-radius: var(--r-lg);
            font-size: 13px; margin-bottom: var(--sp-4);
            text-align: center; box-shadow: var(--sh-sm);
        }
        .name-required-banner.show { display: flex; align-items: center; justify-content: center; gap: var(--sp-2); }
        .name-required-banner button { background: var(--c-danger); color: white; padding: 4px 12px; border-radius: var(--r-md); font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📋</div>
                <span>代办清单</span>
            </div>
            <div class="header-spacer"></div>
            <div class="header-actions">
                <div class="connection-badge" id="conn-badge" title="点击设置">
                    <span class="status-dot"></span>
                    <span id="conn-text">连接中</span>
                </div>
                <button class="icon-btn" id="settings-btn" title="设置">⚙</button>
            </div>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="d-total">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card success">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="d-done">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="d-today">0</div>
                <div class="stat-label">今日待办</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="d-rate">0%</div>
                <div class="stat-label">完成率</div>
            </div>
        </div>

        <div class="name-required-banner" id="name-banner">
            ⚠️ 请先设置你的名字才能添加任务
            <button id="banner-set-name">立即设置</button>
        </div>

        <div class="add-card" id="add-card">
            <div class="add-row">
                <input type="text" class="add-input" id="todo-input" placeholder="想做什么？输入任务按回车..." maxlength="200">
                <button class="add-submit" id="add-btn" title="添加">+</button>
            </div>
            <div class="add-meta">
                <span class="add-meta-label">📅 截止</span>
                <input type="date" class="chip-date" id="due-input">
                <span class="add-meta-label" style="margin-left: 8px">🎯 优先级</span>
                <div class="chip-group" id="priority-group">
                    <button class="chip prio-high" data-prio="high"><span class="chip-dot"></span>高</button>
                    <button class="chip prio-medium" data-prio="medium"><span class="chip-dot"></span>中</button>
                    <button class="chip prio-low" data-prio="low"><span class="chip-dot"></span>低</button>
                </div>
            </div>
        </div>

        <div class="toolbar" id="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="搜索任务...">
            </div>
            <div class="filter-tabs" id="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="today">今天</button>
                <button class="filter-tab" data-filter="week">本周</button>
                <button class="filter-tab" data-filter="overdue">已过期</button>
                <button class="filter-tab" data-filter="completed">已完成</button>
            </div>
        </div>

        <div class="online-panel">
            <div class="online-title">
                <span class="online-pulse"></span>
                <span>在线 <strong id="online-count">0</strong> 人</span>
            </div>
            <div class="online-list" id="online-list">
                <div class="online-empty">连接中...</div>
            </div>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙ 设置</h3>
            <div class="modal-section">
                <label class="modal-section-label">👤 你的名字</label>
                <input type="text" id="user-name-input" placeholder="例如：小明" maxlength="20">
            </div>
            <div class="modal-section">
                <label class="modal-section-label">🌐 服务器地址</label>
                <p style="font-size: 12px;">默认：<code id="default-url-hint"></code></p>
                <input type="text" id="ws-url-input" placeholder="留空使用同源">
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="modal-cancel">取消</button>
                <button class="modal-btn primary" id="modal-connect">保存</button>
            </div>
            <p id="required-hint" style="display:none; color: var(--c-danger); font-size: 12px; margin-top: 8px;">⚠️ 必须填写名字才能使用</p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // ====== 全局状态 ======
        let todos = [];
        let onlineUsers = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let expandedTodos = new Set();
        let ws = null;
        const defaultWsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
        let wsUrl = localStorage.getItem('todo_ws_url') || defaultWsUrl;
        let reconnectTimer = null;
        let userId = localStorage.getItem('todo_user_id');
        if (!userId) { userId = 'u-' + Math.random().toString(36).slice(2, 8); localStorage.setItem('todo_user_id', userId); }
        let userName = localStorage.getItem('todo_user_name') || '';
        let modalIsRequired = false;
        let selectedPriority = null;

        // ====== 工具函数 ======
        const AVATAR_COLORS = ['#f56565','#ed8936','#ecc94b','#48bb78','#38b2ac','#4299e1','#667eea','#9f7aea','#ed64a6','#a0aec0'];
        function hashCode(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i) | 0; return Math.abs(h); }
        function getUserColor(id) { return !id ? '#a0aec0' : AVATAR_COLORS[hashCode(id) % AVATAR_COLORS.length]; }
        function getInitial(name, id) { if (name && name.trim()) return name.trim()[0].toUpperCase(); if (id) return id[0].toUpperCase(); return '?'; }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }
        function formatRelative(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return '刚刚';
            if (m < 60) return m + ' 分钟前';
            const h = Math.floor(m / 60);
            if (h < 24) return h + ' 小时前';
            const d = Math.floor(h / 24);
            if (d < 7) return d + ' 天前';
            return new Date(iso).toLocaleDateString('zh-CN');
        }
        function getDueStatus(dueDate) {
            if (!dueDate) return null;
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const due = new Date(dueDate + 'T00:00:00');
            if (isNaN(due.getTime())) return null;
            const diff = Math.round((due - today) / 86400000);
            if (diff < 0) return { cls: 'due-overdue', icon: '⚠', text: `已过期 ${-diff} 天` };
            if (diff === 0) return { cls: 'due-today', icon: '🔥', text: '今天到期' };
            if (diff === 1) return { cls: 'due-soon', icon: '⏰', text: '明天到期' };
            if (diff <= 3) return { cls: 'due-soon', icon: '⏰', text: `${diff} 天后` };
            if (diff <= 7) return { cls: 'due-upcoming', icon: '📅', text: `${diff} 天后` };
            return { cls: 'due-future', icon: '📅', text: `${due.getMonth()+1}/${due.getDate()}` };
        }
        const PRIO = { high: { cls: 'prio-high', icon: '🔴', text: '高' }, medium: { cls: 'prio-medium', icon: '🟡', text: '中' }, low: { cls: 'prio-low', icon: '🟢', text: '低' } };

        // ====== Toast 通知 ======
        function toast(msg, type = 'info', opts = {}) {
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = `
                <span class="toast-icon">${icons[type] || 'ℹ'}</span>
                <div class="toast-body">
                    ${opts.title ? `<div class="toast-title">${escapeHtml(opts.title)}</div>` : ''}
                    <div class="toast-msg">${escapeHtml(msg)}</div>
                </div>
                ${opts.action ? `<button class="toast-action" data-action="${opts.action.id}">${escapeHtml(opts.action.label)}</button>` : ''}
                <button class="toast-close">×</button>
            `;
            container.appendChild(t);
            const close = () => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); };
            t.querySelector('.toast-close').addEventListener('click', close);
            if (opts.action) {
                t.querySelector('.toast-action').addEventListener('click', () => { opts.action.handler(); close(); });
            }
            setTimeout(close, opts.duration || 3500);
        }

        // ====== 渲染 ======
        function renderSubtasks(todo) {
            const subs = todo.subtasks || [];
            const done = subs.filter(s => s.completed).length;
            const total = subs.length;
            return `
                <div class="subtask-list">
                    ${subs.map(s => `
                        <li class="subtask-item ${s.completed ? 'done' : ''}" data-sub-id="${escapeAttr(s.id)}">
                            <input type="checkbox" class="subtask-checkbox" ${s.completed ? 'checked' : ''}>
                            <span class="subtask-text">${escapeHtml(s.text)}</span>
                            <button class="subtask-remove" title="删除">✕</button>
                        </li>
                    `).join('')}
                </div>
                <div class="subtask-add">
                    <input type="text" class="subtask-input" placeholder="+ 添加子任务（回车确认）" data-add-subtask>
                    ${total > 0 ? `<span class="subtask-progress ${done === total && total > 0 ? 'done' : ''}">${done}/${total}</span>` : ''}
                </div>
            `;
        }

        function renderAttachments(todo) {
            const atts = todo.attachments || [];
            return `
                ${atts.length ? `<ul class="attach-list">${atts.map((a, i) => `
                    <li class="attach-item">
                        <span class="attach-icon">🔗</span>
                        <a href="${escapeHtml(a)}" target="_blank" rel="noopener" style="flex:1; color:inherit; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${escapeHtml(a)}</a>
                        <button class="attach-remove" data-remove-attach="${i}">✕</button>
                    </li>
                `).join('')}</ul>` : ''}
                <div class="attach-input-row">
                    <input type="text" class="attach-input" placeholder="+ 添加链接（如 https://...）回车确认" data-add-attach>
                </div>
            `;
        }

        function renderTodoCard(todo) {
            const isExpanded = expandedTodos.has(todo.id);
            const due = getDueStatus(todo.dueDate);
            const prioInfo = PRIO[todo.priority];
            const subs = todo.subtasks || [];
            const subsDone = subs.filter(s => s.completed).length;
            const atts = todo.attachments || [];
            const desc = todo.description || '';
            const authorId = todo.completed && todo.completedBy ? todo.completedBy : todo.createdBy;
            const authorName = todo.completed && todo.completedByName ? todo.completedByName : todo.createdByName;
            const authorTime = todo.completed && todo.completedAt ? todo.completedAt : todo.createdAt;
            const authorColor = getUserColor(authorId);
            const authorInitial = getInitial(authorName, authorId);

            const meta = [];
            if (prioInfo) meta.push(`<span class="meta-pill ${prioInfo.cls}">${prioInfo.icon} ${prioInfo.text}</span>`);
            if (due) meta.push(`<span class="meta-pill ${due.cls}">${due.icon} ${due.text}</span>`);
            if (subs.length) meta.push(`<span class="meta-pill subtask">☑ ${subsDone}/${subs.length}</span>`);
            if (desc) meta.push(`<span class="meta-pill desc">📝 有描述</span>`);
            if (atts.length) meta.push(`<span class="meta-pill attach">🔗 ${atts.length}</span>`);
            if (authorName) meta.push(`<span class="meta-author ${todo.completed ? 'completed' : ''}" title="${todo.completed ? '完成' : '添加'}于 ${formatRelative(authorTime)}">
                <span class="avatar" style="background:${authorColor}">${escapeHtml(authorInitial)}</span>
                ${escapeHtml(authorName)} · ${formatRelative(authorTime)}
            </span>`);

            return `
                <li class="todo-card ${todo.completed ? 'completed' : ''} ${todo.priority ? 'priority-' + todo.priority : ''} ${isExpanded ? 'expanded' : ''}" data-id="${escapeAttr(todo.id)}">
                    <div class="todo-main" data-action="toggle-expand">
                        <input type="checkbox" class="todo-checkbox" data-action="toggle" ${todo.completed ? 'checked' : ''}>
                        <div class="todo-body">
                            <div class="todo-text">${escapeHtml(todo.text)}</div>
                            <div class="todo-meta">${meta.join('')}</div>
                        </div>
                        <div class="todo-actions">
                            <span class="todo-expand-icon">▾</span>
                            <button class="todo-action-btn danger" data-action="delete" title="删除">✕</button>
                        </div>
                    </div>
                    <div class="todo-details">
                        <div class="todo-details-inner">
                            <div class="detail-section">
                                <div class="detail-label">📝 描述</div>
                                <textarea class="detail-textarea" data-field="description" placeholder="点击添加详细描述...">${escapeHtml(desc)}</textarea>
                            </div>
                            <div class="detail-section">
                                <div class="detail-label">☑ 子任务</div>
                                ${renderSubtasks(todo)}
                            </div>
                            <div class="detail-section">
                                <div class="detail-label">🔗 附件链接</div>
                                ${renderAttachments(todo)}
                            </div>
                        </div>
                    </div>
                </li>
            `;
        }

        function render() {
            const list = document.getElementById('todo-list');
            const filtered = todos.filter(t => {
                if (currentFilter === 'completed') return t.completed;
                if (currentFilter === 'today') {
                    if (t.completed) return false;
                    const due = getDueStatus(t.dueDate);
                    return due && due.cls === 'due-today';
                }
                if (currentFilter === 'week') {
                    if (t.completed) return false;
                    const due = getDueStatus(t.dueDate);
                    return due && ['due-today', 'due-soon', 'due-upcoming'].includes(due.cls);
                }
                if (currentFilter === 'overdue') {
                    if (t.completed) return false;
                    const due = getDueStatus(t.dueDate);
                    return due && due.cls === 'due-overdue';
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const inText = t.text.toLowerCase().includes(q);
                    const inDesc = (t.description || '').toLowerCase().includes(q);
                    const inSubs = (t.subtasks || []).some(s => s.text.toLowerCase().includes(q));
                    if (!inText && !inDesc && !inSubs) return false;
                }
                return true;
            });

            if (filtered.length === 0) {
                const emptyIcon = searchQuery ? '🔍' : (currentFilter === 'completed' ? '🎉' : '📝');
                const emptyTitle = searchQuery ? '没找到匹配的任务' : (currentFilter === 'completed' ? '还没有完成的任务' : '还没有任务');
                const emptyHint = searchQuery ? '试试其他关键词' : '在输入框添加你的第一个任务吧';
                list.innerHTML = `<div class="empty-state"><div class="empty-illustration">${emptyIcon}</div><div class="empty-title">${emptyTitle}</div><div class="empty-hint">${emptyHint}</div></div>`;
            } else {
                list.innerHTML = filtered.map(renderTodoCard).join('');
            }
            updateDashboard();
        }

        function updateDashboard() {
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const today = todos.filter(t => {
                if (t.completed) return false;
                const due = getDueStatus(t.dueDate);
                return due && due.cls === 'due-today';
            }).length;
            const rate = total > 0 ? Math.round(done / total * 100) : 0;
            document.getElementById('d-total').textContent = total;
            document.getElementById('d-done').textContent = done;
            document.getElementById('d-today').textContent = today;
            document.getElementById('d-rate').textContent = rate + '%';
        }

        // ====== 用户操作 ======
        function send(msg) {
            const enriched = { ...msg, user: userId, userName: userName };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(enriched));
                return true;
            }
            return false;
        }

        function addTodo() {
            const text = document.getElementById('todo-input').value.trim();
            if (!text) return;
            const dueDate = document.getElementById('due-input').value || null;
            if (send({ type: 'add', text, dueDate, priority: selectedPriority, userName })) {
                document.getElementById('todo-input').value = '';
                document.getElementById('due-input').value = '';
                selectedPriority = null;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.classList.remove('active'));
                toast('任务已添加', 'success', { title: '✓ 添加成功' });
            } else {
                toast('未连接到服务器', 'error');
            }
        }

        // ====== 事件 ======
        document.getElementById('add-btn').addEventListener('click', addTodo);
        document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
        document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; render(); });
        document.querySelectorAll('.chip[data-prio]').forEach(c => {
            c.addEventListener('click', () => {
                if (c.disabled) return;
                document.querySelectorAll('.chip[data-prio]').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                selectedPriority = c.dataset.prio;
            });
        });
        document.querySelectorAll('.filter-tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                currentFilter = t.dataset.filter;
                render();
            });
        });

        // 任务列表事件
        document.getElementById('todo-list').addEventListener('click', e => {
            const card = e.target.closest('.todo-card');
            if (!card) return;
            const id = card.dataset.id;

            if (e.target.matches('[data-action="toggle"]')) {
                e.stopPropagation();
                send({ type: 'update', id, updates: { completed: e.target.checked }, userName });
                return;
            }
            if (e.target.closest('[data-action="delete"]')) {
                e.stopPropagation();
                const todo = todos.find(t => t.id === id);
                send({ type: 'delete', id, userName });
                if (todo) {
                    toast(`已删除「${todo.text.slice(0, 20)}」`, 'info', {
                        title: '已删除',
                        action: {
                            id: 'undo-' + id,
                            label: '撤销',
                            handler: () => {
                                send({
                                    type: 'add',
                                    text: todo.text,
                                    priority: todo.priority,
                                    dueDate: todo.dueDate,
                                    description: todo.description || '',
                                    subtasks: todo.subtasks || [],
                                    attachments: todo.attachments || [],
                                    userName
                                });
                                toast('已恢复', 'success');
                            }
                        },
                        duration: 6000
                    });
                }
                return;
            }
            const removeAttachIdx = e.target.dataset.removeAttach;
            if (removeAttachIdx !== undefined) {
                e.stopPropagation();
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newAtts = (todo.attachments || []).filter((_, i) => i !== Number(removeAttachIdx));
                send({ type: 'update', id, updates: { attachments: newAtts }, userName });
                return;
            }
            if (e.target.closest('[data-action="toggle-expand"]')) {
                if (expandedTodos.has(id)) expandedTodos.delete(id);
                else expandedTodos.add(id);
                card.classList.toggle('expanded');
                return;
            }
            if (e.target.matches('.subtask-checkbox')) {
                e.stopPropagation();
                const subItem = e.target.closest('.subtask-item');
                const subId = subItem.dataset.subId;
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newSubs = (todo.subtasks || []).map(s => s.id === subId ? { ...s, completed: e.target.checked } : s);
                send({ type: 'update', id, updates: { subtasks: newSubs }, userName });
                return;
            }
            if (e.target.matches('.subtask-remove')) {
                e.stopPropagation();
                const subItem = e.target.closest('.subtask-item');
                const subId = subItem.dataset.subId;
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newSubs = (todo.subtasks || []).filter(s => s.id !== subId);
                send({ type: 'update', id, updates: { subtasks: newSubs }, userName });
                return;
            }
        });

        document.getElementById('todo-list').addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.target.matches('[data-add-subtask]')) {
                e.preventDefault();
                const text = e.target.value.trim();
                if (!text) return;
                const card = e.target.closest('.todo-card');
                const id = card.dataset.id;
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newSubs = [...(todo.subtasks || []), { id: 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), text, completed: false }];
                send({ type: 'update', id, updates: { subtasks: newSubs }, userName });
            }
            if (e.key === 'Enter' && e.target.matches('[data-add-attach]')) {
                e.preventDefault();
                const text = e.target.value.trim();
                if (!text) return;
                const card = e.target.closest('.todo-card');
                const id = card.dataset.id;
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newAtts = [...(todo.attachments || []), text];
                send({ type: 'update', id, updates: { attachments: newAtts }, userName });
            }
        });

        document.getElementById('todo-list').addEventListener('blur', e => {
            if (e.target.matches('[data-field="description"]')) {
                const card = e.target.closest('.todo-card');
                if (!card) return;
                const id = card.dataset.id;
                const newDesc = e.target.value;
                const todo = todos.find(t => t.id === id);
                if (todo && newDesc !== (todo.description || '')) {
                    send({ type: 'update', id, updates: { description: newDesc }, userName });
                }
            }
        }, true);

        // ====== WebSocket ======
        function setStatus(status, text) {
            const badge = document.getElementById('conn-badge');
            const txt = document.getElementById('conn-text');
            badge.className = 'connection-badge ' + status;
            txt.textContent = text;
            applyUserState();
        }

        function applyUserState() {
            const banner = document.getElementById('name-banner');
            const addCard = document.getElementById('add-card');
            const toolbar = document.getElementById('toolbar');
            const hasName = !!(userName && userName.trim());
            const online = ws && ws.readyState === WebSocket.OPEN;
            if (hasName) {
                banner.classList.remove('show');
                [addCard, toolbar].forEach(el => el.classList.remove('locked'));
                document.getElementById('todo-input').disabled = !online;
                document.getElementById('add-btn').disabled = !online;
                document.getElementById('due-input').disabled = !online;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.disabled = !online);
            } else {
                banner.classList.add('show');
                [addCard, toolbar].forEach(el => el.classList.add('locked'));
                document.getElementById('todo-input').disabled = true;
                document.getElementById('add-btn').disabled = true;
                document.getElementById('due-input').disabled = true;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.disabled = true);
            }
        }

        function connect() {
            let url = wsUrl.trim();
            if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
            else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);
            setStatus('connecting', '连接中...');
            clearTimeout(reconnectTimer);
            try { ws = new WebSocket(url); } catch (e) { setStatus('disconnected', '连接失败'); scheduleReconnect(); return; }
            ws.onopen = () => { setStatus('connected', '已连接'); send({ type: 'hello', userName }); };
            ws.onmessage = e => { try { handleServerMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
            ws.onerror = e => console.error('WS error', e);
            ws.onclose = () => { setStatus('disconnected', '已断开'); scheduleReconnect(); };
        }
        function scheduleReconnect() { clearTimeout(reconnectTimer); reconnectTimer = setTimeout(connect, 3000); }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'state': todos = Array.isArray(msg.todos) ? msg.todos : []; render(); break;
                case 'added': if (!todos.some(t => t.id === msg.todo.id)) { todos.push(msg.todo); render(); } break;
                case 'updated': {
                    const idx = todos.findIndex(t => t.id === msg.todo.id);
                    if (idx >= 0) { todos[idx] = msg.todo; render(); }
                    break;
                }
                case 'deleted': todos = todos.filter(t => t.id !== msg.id); render(); break;
                case 'cleared': todos = []; render(); break;
                case 'online': document.getElementById('online-count').textContent = msg.count; break;
                case 'online-list': renderOnlineList(msg.users || []); break;
            }
        }

        function renderOnlineList(users) {
            onlineUsers = users;
            const list = document.getElementById('online-list');
            const count = document.getElementById('online-count');
            count.textContent = users.length;
            if (users.length === 0) {
                list.innerHTML = '<div class="online-empty">只有你在线</div>';
                return;
            }
            list.innerHTML = users.map(u => {
                const isMe = u.id === userId;
                const initial = getInitial(u.name, u.id);
                const color = getUserColor(u.id);
                const tooltip = `${escapeHtml(u.name)} · IP: ${escapeHtml(u.ip || '?')}${isMe ? '（你）' : ''}`;
                return `<span class="online-user" title="${tooltip}">
                    <span class="avatar" style="background:${color}">${escapeHtml(initial)}</span>
                    ${escapeHtml(u.name)}${isMe ? '<span class="me-tag">我</span>' : ''}
                </span>`;
            }).join('');
        }

        // ====== 设置模态框 ======
        const modal = document.getElementById('settings-modal');
        const userNameInput = document.getElementById('user-name-input');
        const wsUrlInput = document.getElementById('ws-url-input');
        const requiredHint = document.getElementById('required-hint');

        function showModal(required = false) {
            modalIsRequired = required;
            userNameInput.value = userName || '';
            wsUrlInput.value = (wsUrl === defaultWsUrl ? '' : wsUrl);
            document.getElementById('default-url-hint').textContent = defaultWsUrl;
            if (required) {
                modal.classList.add('required', 'required-mode');
                requiredHint.style.display = 'block';
            } else {
                modal.classList.remove('required', 'required-mode');
                requiredHint.style.display = 'none';
            }
            modal.classList.add('active');
            setTimeout(() => userNameInput.focus(), 50);
        }
        function hideModal() { if (modalIsRequired) return; modal.classList.remove('active'); }

        document.getElementById('conn-badge').addEventListener('click', () => showModal(false));
        document.getElementById('settings-btn').addEventListener('click', () => showModal(false));
        document.getElementById('modal-cancel').addEventListener('click', hideModal);
        document.getElementById('modal-connect').addEventListener('click', () => {
            const newName = userNameInput.value.trim();
            if (modalIsRequired && !newName) { userNameInput.focus(); return; }
            if (newName !== userName) {
                userName = newName;
                if (newName) localStorage.setItem('todo_user_name', userName);
                else localStorage.removeItem('todo_user_name');
                applyUserState();
            }
            const url = wsUrlInput.value.trim();
            wsUrl = url || defaultWsUrl;
            if (url) localStorage.setItem('todo_ws_url', wsUrl);
            else localStorage.removeItem('todo_ws_url');
            modalIsRequired = false;
            hideModal();
            if (ws) { try { ws.close(); } catch(e){} }
            connect();
        });
        document.getElementById('banner-set-name').addEventListener('click', () => showModal(true));
        userNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('modal-connect').click(); });
        modal.addEventListener('click', e => { if (e.target === modal) hideModal(); });

        // ====== 启动 ======
        applyUserState();
        connect();
        render();
        setInterval(render, 60000);
        if (!userName) setTimeout(() => showModal(true), 600);
    </script>
</body>
</html>
