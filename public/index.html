<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>代办清单 · My Tasks</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        :root {
            --c-bg: #f5f5f7;
            --c-surface: #ffffff;
            --c-surface-2: #fafafc;
            --c-border: #e5e7eb;
            --c-border-strong: #d1d5db;
            --c-text: #111827;
            --c-text-2: #4b5563;
            --c-text-3: #9ca3af;
            --c-primary: #6366f1;
            --c-primary-hover: #4f46e5;
            --c-primary-soft: #eef2ff;
            --c-success: #10b981;
            --c-warning: #f59e0b;
            --c-danger: #ef4444;
            --c-danger-soft: #fee2e2;
            --c-prio-high: #ef4444;
            --c-prio-high-bg: #fef2f2;
            --c-prio-medium: #f59e0b;
            --c-prio-medium-bg: #fffbeb;
            --c-prio-low: #10b981;
            --c-prio-low-bg: #f0fdf4;
            --c-overdue: #dc2626;
            --c-today: #ea580c;
            --c-soon: #ca8a04;
            --c-upcoming: #16a34a;
            --c-future: #6b7280;
            --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
            --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
            --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
            --r-full: 9999px;
            --sh-sm: 0 1px 2px rgba(0,0,0,0.05);
            --sh-md: 0 4px 12px rgba(0,0,0,0.08);
            --sh-lg: 0 10px 30px rgba(0,0,0,0.10);
            --sh-xl: 0 25px 60px rgba(0,0,0,0.15);
            --ff: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            --t-fast: 0.15s ease;
            --t-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --t-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: var(--ff);
            color: var(--c-text);
            min-height: 100vh;
            padding: var(--sp-6) var(--sp-4);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
            background-color: #1a1033;
        }
        /* 花哨动态背景（同 v1.4.0） */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?w=1920&q=80&auto=format');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -3;
            filter: brightness(0.85) saturate(1.2);
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(at 20% 30%, hsla(280, 95%, 70%, 0.4) 0px, transparent 50%),
                radial-gradient(at 80% 70%, hsla(330, 95%, 70%, 0.35) 0px, transparent 50%),
                radial-gradient(at 50% 100%, hsla(220, 90%, 65%, 0.3) 0px, transparent 50%);
            z-index: -2;
            animation: meshMove 20s ease-in-out infinite;
        }
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(2%, -2%); }
        }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input, textarea, select { font-family: inherit; outline: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: var(--r-full); }
        .app { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--r-xl);
            padding: var(--sp-4) var(--sp-5);
            margin-bottom: var(--sp-4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            flex-wrap: wrap;
            color: white;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            color: white;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(245, 87, 108, 0.4);
        }
        .header-spacer { flex: 1; }
        .header-actions { display: flex; align-items: center; gap: var(--sp-2); }
        .user-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px 4px 4px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--r-full);
            font-size: 12px;
            color: white;
        }
        .user-badge .avatar {
            width: 24px; height: 24px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 11px; font-weight: 700;
        }
        .icon-btn {
            width: 36px; height: 36px;
            border-radius: var(--r-md);
            display: flex; align-items: center; justify-content: center;
            color: white;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            font-size: 16px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); }

        /* Tab 导航 */
        .tab-nav {
            display: flex;
            gap: 6px;
            margin-bottom: var(--sp-4);
            padding: 4px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--r-full);
        }
        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            border-radius: var(--r-full);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .tab-btn.active {
            background: white;
            color: var(--c-primary);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .tab-count {
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 11px;
            padding: 1px 7px;
            border-radius: var(--r-full);
            font-weight: 600;
        }
        .tab-btn.active .tab-count { background: var(--c-primary-soft); color: var(--c-primary); }

        /* 新闻页面 */
        .news-toolbar {
            display: flex; gap: 6px;
            margin-bottom: var(--sp-3);
        }
        .news-source-select {
            flex: 1;
            padding: 8px 12px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-md);
            color: white;
            font-size: 13px;
            cursor: pointer;
            color-scheme: dark;
        }
        .news-source-select option { background: #1a1033; color: white; }
        .news-refresh-btn {
            width: 36px;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-md);
            color: white;
            font-size: 16px;
        }
        .news-refresh-btn:hover { background: rgba(255,255,255,0.3); }
        .news-refresh-btn.spinning { animation: spin 0.6s linear infinite; }
        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        .news-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: var(--sp-3);
            padding: 0 4px;
        }
        .news-list { list-style: none; display: flex; flex-direction: column; gap: var(--sp-2); }
        .news-item {
            display: flex;
            gap: var(--sp-3);
            padding: var(--sp-3);
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: var(--r-lg);
            color: white;
            text-decoration: none;
            transition: all 0.2s;
            animation: cardIn 0.3s ease;
        }
        .news-item:hover {
            background: rgba(255,255,255,0.28);
            transform: translateX(2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .news-item-rank {
            font-size: 20px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            min-width: 28px;
            text-align: center;
        }
        .news-item-rank.top1 { color: #f87171; }
        .news-item-rank.top2 { color: #fb923c; }
        .news-item-rank.top3 { color: #fbbf24; }
        .news-item-body { flex: 1; min-width: 0; }
        .news-item-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .news-item-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .news-item-source {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 1px 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }
        .news-empty, .news-error {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.6);
        }
        .news-error { color: #fca5a5; }
        .news-config-hint {
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fde68a;
            padding: 10px 14px;
            border-radius: var(--r-md);
            font-size: 12px;
            margin-bottom: var(--sp-3);
        }
        .widget-launch-btn {
            display: flex; align-items: center; gap: 4px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-radius: var(--r-full);
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
            transition: all 0.2s;
            animation: widgetPulse 2.5s infinite;
        }
        .widget-launch-btn:hover {
            transform: translateY(-1px) scale(1.05);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
            animation: none;
        }
        @keyframes widgetPulse {
            0%, 100% { box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4); }
            50% { box-shadow: 0 4px 20px rgba(245, 87, 108, 0.7); }
        }
        .connection-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px;
            border-radius: var(--r-full);
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--c-warning);
            box-shadow: 0 0 8px currentColor;
        }
        .connection-badge.connected .status-dot { background: #4ade80; }
        .connection-badge.connecting .status-dot { background: #fbbf24; animation: pulseDot 1.2s infinite; }
        .connection-badge.disconnected .status-dot { background: #f87171; }
        @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--sp-3);
            margin-bottom: var(--sp-4);
        }
        @media (max-width: 600px) { .dashboard { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--r-lg);
            padding: var(--sp-3);
            color: white;
        }
        .stat-icon { font-size: 18px; margin-bottom: var(--sp-1); }
        .stat-value { font-size: 24px; font-weight: 700; line-height: 1.2; }
        .stat-label { font-size: 11px; opacity: 0.85; margin-top: 2px; }
        .add-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: var(--r-xl);
            padding: var(--sp-4);
            margin-bottom: var(--sp-4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            color: white;
        }
        .add-row { display: flex; gap: var(--sp-2); align-items: center; }
        .add-input {
            flex: 1; border: none; background: transparent;
            font-size: 15px; color: white;
            padding: var(--sp-2) var(--sp-3);
        }
        .add-input::placeholder { color: rgba(255,255,255,0.6); }
        .add-meta {
            display: flex; gap: var(--sp-2);
            margin-top: var(--sp-3); padding-top: var(--sp-3);
            border-top: 1px dashed rgba(255,255,255,0.25);
            flex-wrap: wrap; align-items: center;
        }
        .add-meta-label { font-size: 12px; color: rgba(255,255,255,0.8); }
        .chip-group { display: inline-flex; gap: 4px; }
        .chip {
            padding: 4px 10px; font-size: 12px;
            border-radius: var(--r-full);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            display: inline-flex; align-items: center; gap: 4px;
            cursor: pointer;
            transition: all var(--t-fast);
        }
        .chip:hover { background: rgba(255,255,255,0.3); }
        .chip.active { background: white; color: var(--c-primary); border-color: white; font-weight: 600; }
        .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
        .chip.prio-high .chip-dot { background: #fca5a5; }
        .chip.prio-medium .chip-dot { background: #fcd34d; }
        .chip.prio-low .chip-dot { background: #6ee7b7; }
        .chip.active .chip-dot { background: currentColor; opacity: 0.5; }
        .chip-date {
            border: 1px solid rgba(255,255,255,0.3);
            padding: 3px 8px;
            border-radius: var(--r-sm);
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            color: white;
            color-scheme: dark;
        }
        .add-submit {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-radius: var(--r-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(245, 87, 108, 0.4);
        }
        .add-submit:hover:not(:disabled) { transform: scale(1.05); }
        .add-submit:disabled { background: rgba(255,255,255,0.3); cursor: not-allowed; }
        .toolbar {
            display: flex; align-items: center; gap: var(--sp-3);
            margin-bottom: var(--sp-3); flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 180px; }
        .search-input {
            width: 100%;
            padding: var(--sp-2) var(--sp-3) var(--sp-2) 36px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-full);
            font-size: 13px; color: white;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .search-input:focus { background: rgba(255,255,255,0.3); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.7); font-size: 14px; pointer-events: none; }
        .filter-tabs {
            display: flex;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: var(--r-full);
            padding: 3px; gap: 2px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 5px 10px; font-size: 11px;
            color: rgba(255,255,255,0.85);
            border-radius: var(--r-full);
            white-space: nowrap;
        }
        .filter-tab.active { background: white; color: var(--c-primary); font-weight: 600; }
        .online-panel {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--r-lg);
            padding: var(--sp-2) var(--sp-4);
            margin-bottom: var(--sp-3);
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
        }
        .online-pulse { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.3); animation: pulseDot 1.6s infinite; }
        .online-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .online-user {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px 2px 2px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--r-full);
            font-size: 11px;
        }
        .online-user .avatar {
            width: 18px; height: 18px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 9px; font-weight: 700;
        }
        .online-user .me-tag { background: #f5576c; font-size: 8px; padding: 1px 4px; border-radius: var(--r-full); margin-left: 2px; }
        .todo-list { list-style: none; display: flex; flex-direction: column; gap: var(--sp-2); }
        .todo-card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--r-lg);
            overflow: hidden;
            color: white;
            transition: all var(--t-base);
            animation: cardIn var(--t-slow) ease;
        }
        .todo-card:hover { background: rgba(255,255,255,0.25); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .todo-card.priority-high { border-left: 4px solid #fca5a5; }
        .todo-card.priority-medium { border-left: 4px solid #fcd34d; }
        .todo-card.priority-low { border-left: 4px solid #6ee7b7; }
        .todo-main {
            display: flex; align-items: center; gap: var(--sp-3);
            padding: var(--sp-3) var(--sp-4);
        }
        .todo-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #f5576c; flex-shrink: 0; }
        .todo-body { flex: 1; min-width: 0; }
        .todo-text { font-size: 15px; font-weight: 500; word-break: break-word; }
        .todo-card.completed .todo-text { text-decoration: line-through; opacity: 0.6; }
        .todo-meta { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .meta-pill {
            display: inline-flex; align-items: center; gap: 2px;
            padding: 1px 6px; font-size: 10px;
            border-radius: var(--r-full);
            font-weight: 500;
        }
        .meta-pill.prio-high { background: rgba(252, 165, 165, 0.9); color: #7f1d1d; }
        .meta-pill.prio-medium { background: rgba(252, 211, 77, 0.9); color: #78350f; }
        .meta-pill.prio-low { background: rgba(110, 231, 183, 0.9); color: #064e3b; }
        .meta-pill.due-overdue { background: rgba(248, 113, 113, 0.95); color: white; font-weight: 700; }
        .meta-pill.due-today { background: rgba(251, 146, 60, 0.95); color: white; font-weight: 700; }
        .meta-pill.due-soon { background: rgba(252, 211, 77, 0.9); color: #78350f; }
        .meta-pill.due-upcoming { background: rgba(110, 231, 183, 0.85); color: #064e3b; }
        .meta-pill.due-future { background: rgba(255,255,255,0.25); color: rgba(255,255,255,0.85); }
        .todo-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .todo-action-btn {
            width: 28px; height: 28px;
            border-radius: var(--r-sm);
            color: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .todo-action-btn:hover { background: rgba(255,255,255,0.2); color: white; }
        .empty-state { text-align: center; padding: var(--sp-10) var(--sp-6); color: rgba(255,255,255,0.7); }
        .empty-illustration { font-size: 64px; margin-bottom: var(--sp-3); opacity: 0.7; }
        .empty-title { font-size: 16px; margin-bottom: var(--sp-2); font-weight: 500; color: white; }
        .empty-hint { font-size: 13px; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: var(--sp-2); pointer-events: none; }
        .toast {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--r-md);
            padding: var(--sp-3) var(--sp-4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: var(--sp-3);
            min-width: 280px; max-width: 400px;
            pointer-events: auto;
            border-left: 4px solid var(--c-primary);
            color: white;
            animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.success { border-left-color: #4ade80; }
        .toast.error { border-left-color: #f87171; }
        .toast-action { font-size: 12px; color: #f093fb; font-weight: 600; padding: 2px 8px; border-radius: var(--r-sm); background: rgba(240, 147, 251, 0.15); }
        .toast-close { color: rgba(255,255,255,0.6); padding: 0 4px; font-size: 16px; }
        .toast.removing { animation: toastOut 0.3s forwards; }
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 100; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: linear-gradient(135deg, #2a1a4a, #1a1033);
            color: white;
            border-radius: var(--r-xl);
            padding: var(--sp-6);
            width: 100%; max-width: 460px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal h3 { font-size: 18px; margin-bottom: var(--sp-2); }
        .modal p { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: var(--sp-3); }
        .modal p code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: var(--r-sm); color: #f093fb; }
        .modal input {
            width: 100%; padding: var(--sp-3);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: var(--r-md);
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: var(--sp-3);
        }
        .modal input::placeholder { color: rgba(255,255,255,0.5); }
        .modal-section { margin-bottom: var(--sp-4); }
        .modal-section-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
        .modal-btn { padding: var(--sp-2) var(--sp-4); border-radius: var(--r-md); font-size: 14px; font-weight: 500; }
        .modal-btn.primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .modal-btn.secondary { background: rgba(255,255,255,0.1); color: white; }
        .modal-btn.danger { background: rgba(248, 113, 113, 0.3); color: white; }
        .modal-overlay.required .modal { border: 2px solid #f87171; }
        .modal-overlay.required .modal h3::after { content: ' *必填'; color: #f87171; font-size: 13px; }
        .modal.required-mode .modal-btn.secondary { display: none; }
        .add-card.locked, .toolbar.locked { opacity: 0.5; pointer-events: none; }
        .name-required-banner {
            display: none;
            background: rgba(248, 113, 113, 0.25);
            border: 1px solid rgba(248, 113, 113, 0.5);
            color: white;
            padding: var(--sp-3) var(--sp-4);
            border-radius: var(--r-lg);
            font-size: 13px;
            margin-bottom: var(--sp-3);
            text-align: center;
        }
        .name-required-banner.show { display: block; }
        .name-required-banner button { background: #f87171; color: white; padding: 4px 12px; border-radius: var(--r-md); font-size: 12px; font-weight: 600; }
        .install-btn {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: var(--sp-3) var(--sp-4);
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-radius: var(--r-full);
            font-size: 13px; font-weight: 600;
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.5);
            z-index: 100;
            display: flex; align-items: center; gap: 6px;
            cursor: pointer;
            animation: bounceIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .install-btn:hover { transform: scale(1.05); }
        .install-btn.installed {
            background: rgba(16, 185, 129, 0.9);
            cursor: default;
        }
        .install-btn.installed:hover { transform: none; }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📋</div>
                <span>代办清单</span>
            </div>
            <div class="header-spacer"></div>
            <div class="header-actions">
                <div class="user-badge" id="user-badge" style="display:none">
                    <span class="avatar" id="user-avatar">?</span>
                    <span id="user-name-display"></span>
                </div>
                <div class="connection-badge connecting" id="conn-badge">
                    <span class="status-dot"></span>
                    <span id="conn-text">连接中</span>
                </div>
                <button class="widget-launch-btn" id="open-widget-btn" title="打开桌面小组件（340×520 小窗）">
                    📌 小组件
                </button>
                <button class="icon-btn" id="settings-btn" title="设置">⚙</button>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="todo">
                <span class="tab-icon">📋</span>
                <span>待办</span>
                <span class="tab-count" id="tab-todo-count">0</span>
            </button>
            <button class="tab-btn" data-tab="news">
                <span class="tab-icon">📰</span>
                <span>资讯</span>
                <span class="tab-count" id="tab-news-count">0</span>
            </button>
        </div>

        <div class="tab-content" id="tab-todo">
            <div class="dashboard">
            <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value" id="d-total">0</div><div class="stat-label">总任务</div></div>
            <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" id="d-done">0</div><div class="stat-label">已完成</div></div>
            <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-value" id="d-today">0</div><div class="stat-label">今日待办</div></div>
            <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value" id="d-rate">0%</div><div class="stat-label">完成率</div></div>
        </div>

        <div class="name-required-banner" id="name-banner">
            ⚠️ 请先设置你的名字才能添加任务
            <button id="banner-set-name">立即设置</button>
        </div>

        <div class="add-card" id="add-card">
            <div class="add-row">
                <input type="text" class="add-input" id="todo-input" placeholder="想做什么？输入任务按回车..." maxlength="200">
                <button class="add-submit" id="add-btn">+</button>
            </div>
            <div class="add-meta">
                <span class="add-meta-label">📅</span>
                <input type="date" class="chip-date" id="due-input">
                <span class="add-meta-label">🎯</span>
                <div class="chip-group">
                    <button class="chip prio-high" data-prio="high"><span class="chip-dot"></span>高</button>
                    <button class="chip prio-medium" data-prio="medium"><span class="chip-dot"></span>中</button>
                    <button class="chip prio-low" data-prio="low"><span class="chip-dot"></span>低</button>
                </div>
            </div>
        </div>

        <div class="toolbar" id="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="搜索任务...">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="today">今天</button>
                <button class="filter-tab" data-filter="week">本周</button>
                <button class="filter-tab" data-filter="overdue">已过期</button>
                <button class="filter-tab" data-filter="completed">已完成</button>
            </div>
        </div>

        <div class="online-panel">
            <span class="online-pulse"></span>
            <span>在线 <strong id="online-count">0</strong></span>
            <div class="online-list" id="online-list"></div>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
        </div><!-- end tab-todo -->

        <div class="tab-content" id="tab-news" style="display:none">
            <div class="news-toolbar">
                <select class="news-source-select" id="news-source">
                    <option value="hn">🟠 Hacker News（推荐）</option>
                    <option value="newsapi">📰 NewsAPI（需在设置配置 key）</option>
                    <option value="all">🌐 全部源</option>
                </select>
                <select class="news-source-select" id="news-category">
                    <option value="top">🔥 热门</option>
                    <option value="new">🆕 最新</option>
                </select>
                <button class="news-refresh-btn" id="news-refresh" title="刷新">↻</button>
            </div>
            <div class="news-meta" id="news-meta">加载中...</div>
            <ul class="news-list" id="news-list"></ul>
        </div>
    </div>

    <button class="install-btn" id="install-btn">📥 安装到桌面</button>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙ 设置</h3>
            <div class="modal-section">
                <label class="modal-section-label">👤 你的名字</label>
                <input type="text" id="user-name-input" placeholder="例如：小明" maxlength="20">
            </div>
            <div class="modal-section">
                <label class="modal-section-label">🌐 服务器地址</label>
                <p style="font-size: 12px;">默认：<code id="default-url-hint"></code></p>
                <input type="text" id="ws-url-input" placeholder="留空使用同源">
            </div>
            <div class="modal-section" id="danger-section" style="display:none">
                <label class="modal-section-label">⚠️ 危险操作</label>
                <button class="modal-btn danger" id="clear-my-todos">清空我的所有任务</button>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="modal-cancel">取消</button>
                <button class="modal-btn primary" id="modal-connect">保存</button>
            </div>
            <p id="required-hint" style="display:none; color: #f87171; font-size: 12px; margin-top: 8px;">⚠️ 必须填写名字才能使用</p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // ====== 全局状态 ======
        let todos = [];
        let onlineUsers = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let expandedTodos = new Set();
        let ws = null;
        const defaultWsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
        let wsUrl = localStorage.getItem('todo_ws_url') || defaultWsUrl;
        let reconnectTimer = null;
        let userId = localStorage.getItem('todo_user_id');
        if (!userId) { userId = 'u-' + Math.random().toString(36).slice(2, 8); localStorage.setItem('todo_user_id', userId); }
        let userName = localStorage.getItem('todo_user_name') || '';
        let modalIsRequired = false;
        let selectedPriority = null;
        let deferredInstallPrompt = null;

        // ====== 工具函数 ======
        const AVATAR_COLORS = ['#f56565','#ed8936','#ecc94b','#48bb78','#38b2ac','#4299e1','#667eea','#9f7aea','#ed64a6','#a0aec0'];
        function hashCode(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i) | 0; return Math.abs(h); }
        function getUserColor(id) { return !id ? '#a0aec0' : AVATAR_COLORS[hashCode(id) % AVATAR_COLORS.length]; }
        function getInitial(name, id) { if (name && name.trim()) return name.trim()[0].toUpperCase(); if (id) return id[0].toUpperCase(); return '?'; }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }
        function getDueStatus(dueDate) {
            if (!dueDate) return null;
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const due = new Date(dueDate + 'T00:00:00');
            if (isNaN(due.getTime())) return null;
            const diff = Math.round((due - today) / 86400000);
            if (diff < 0) return { cls: 'due-overdue', icon: '⚠', text: `已过期 ${-diff} 天` };
            if (diff === 0) return { cls: 'due-today', icon: '🔥', text: '今天到期' };
            if (diff === 1) return { cls: 'due-soon', icon: '⏰', text: '明天到期' };
            if (diff <= 3) return { cls: 'due-soon', icon: '⏰', text: `${diff} 天后` };
            if (diff <= 7) return { cls: 'due-upcoming', icon: '📅', text: `${diff} 天后` };
            return { cls: 'due-future', icon: '📅', text: `${due.getMonth()+1}/${due.getDate()}` };
        }
        const PRIO = { high: { cls: 'prio-high', icon: '🔴' }, medium: { cls: 'prio-medium', icon: '🟡' }, low: { cls: 'prio-low', icon: '🟢' } };

        // ====== PWA ======
        const installBtn = document.getElementById('install-btn');
        let deferredInstallPrompt = null;
        let isInstalled = false;

        // 检测是否已安装（standalone 模式 = 已安装为 PWA）
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            isInstalled = true;
            installBtn.classList.add('installed');
            installBtn.innerHTML = '✓ 已安装';
            installBtn.title = '应用已安装为 PWA';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (!isInstalled) {
                installBtn.innerHTML = '📥 安装到桌面';
            }
        });
        installBtn.addEventListener('click', async () => {
            if (isInstalled) {
                // 已安装，提示用户如何打开小组件
                window.open('/widget.html', 'todo-widget', 'width=340,height=520,right=20,bottom=20');
                return;
            }
            if (!deferredInstallPrompt) {
                // 浏览器不支持或还没准备好
                toast('请用 Chrome 或 Edge 浏览器打开，然后点地址栏右侧的「安装」图标', 'info', { title: '💡 安装提示', duration: 6000 });
                return;
            }
            deferredInstallPrompt.prompt();
            const { outcome } = await deferredInstallPrompt.userChoice;
            if (outcome === 'accepted') {
                isInstalled = true;
                installBtn.classList.add('installed');
                installBtn.innerHTML = '✓ 已安装';
                toast('已安装到桌面！', 'success', { title: '🎉 安装成功' });
            }
            deferredInstallPrompt = null;
        });
        window.addEventListener('appinstalled', () => {
            isInstalled = true;
            installBtn.classList.add('installed');
            installBtn.innerHTML = '✓ 已安装';
            toast('已成功安装到桌面！', 'success', { title: '🎉 安装完成' });
        });

        // ====== Toast 通知 ======
        function toast(msg, type = 'info', opts = {}) {
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = `
                <span style="font-size:18px;flex-shrink:0">${icons[type] || 'ℹ'}</span>
                <div style="flex:1">
                    ${opts.title ? `<div style="font-size:13px;font-weight:600">${escapeHtml(opts.title)}</div>` : ''}
                    <div style="font-size:12px;opacity:0.85;margin-top:1px">${escapeHtml(msg)}</div>
                </div>
                ${opts.action ? `<button class="toast-action" data-act>${escapeHtml(opts.action.label)}</button>` : ''}
                <button class="toast-close">×</button>
            `;
            container.appendChild(t);
            const close = () => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); };
            t.querySelector('.toast-close').addEventListener('click', close);
            if (opts.action) t.querySelector('[data-act]').addEventListener('click', () => { opts.action.handler(); close(); });
            setTimeout(close, opts.duration || 3500);
        }

        // ====== 渲染 ======
        function renderTodoCard(todo) {
            const due = getDueStatus(todo.dueDate);
            const prioInfo = PRIO[todo.priority];
            const meta = [];
            if (prioInfo) meta.push(`<span class="meta-pill ${prioInfo.cls}">${prioInfo.icon} ${({high:'高',medium:'中',low:'低'}[todo.priority])}</span>`);
            if (due) meta.push(`<span class="meta-pill ${due.cls}">${due.icon} ${due.text}</span>`);
            return `
                <li class="todo-card ${todo.completed ? 'completed' : ''} ${todo.priority ? 'priority-' + todo.priority : ''}" data-id="${escapeAttr(todo.id)}">
                    <div class="todo-main">
                        <input type="checkbox" class="todo-checkbox" data-action="toggle" ${todo.completed ? 'checked' : ''}>
                        <div class="todo-body">
                            <div class="todo-text">${escapeHtml(todo.text)}</div>
                            <div class="todo-meta">${meta.join('')}</div>
                        </div>
                        <div class="todo-actions">
                            <button class="todo-action-btn" data-action="delete" title="删除">✕</button>
                        </div>
                    </div>
                </li>
            `;
        }

        function render() {
            const list = document.getElementById('todo-list');
            if (!list) return;
            if (!Array.isArray(todos)) todos = [];
            const filtered = todos.filter(t => {
                if (currentFilter === 'completed') return t.completed;
                if (currentFilter === 'today') { if (t.completed) return false; const d = getDueStatus(t.dueDate); return d && d.cls === 'due-today'; }
                if (currentFilter === 'week') { if (t.completed) return false; const d = getDueStatus(t.dueDate); return d && ['due-today', 'due-soon', 'due-upcoming'].includes(d.cls); }
                if (currentFilter === 'overdue') { if (t.completed) return false; const d = getDueStatus(t.dueDate); return d && d.cls === 'due-overdue'; }
                if (searchQuery && !t.text.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                return true;
            });
            if (filtered.length === 0) {
                const emptyIcon = searchQuery ? '🔍' : '📝';
                const emptyTitle = searchQuery ? '没找到匹配' : '还没有任务';
                const emptyHint = searchQuery ? '试试其他关键词' : '输入框添加你的第一个任务';
                list.innerHTML = `<div class="empty-state"><div class="empty-illustration">${emptyIcon}</div><div class="empty-title">${emptyTitle}</div><div class="empty-hint">${emptyHint}</div></div>`;
            } else {
                list.innerHTML = filtered.map(renderTodoCard).join('');
            }
            updateDashboard();
        }

        function updateDashboard() {
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const today = todos.filter(t => { if (t.completed) return false; const d = getDueStatus(t.dueDate); return d && d.cls === 'due-today'; }).length;
            const rate = total > 0 ? Math.round(done / total * 100) : 0;
            document.getElementById('d-total').textContent = total;
            document.getElementById('d-done').textContent = done;
            document.getElementById('d-today').textContent = today;
            document.getElementById('d-rate').textContent = rate + '%';
        }

        function updateUserBadge() {
            const badge = document.getElementById('user-badge');
            if (userName) {
                badge.style.display = 'flex';
                document.getElementById('user-name-display').textContent = userName;
                document.getElementById('user-avatar').textContent = getInitial(userName, userId);
                document.getElementById('user-avatar').style.background = getUserColor(userId);
            } else {
                badge.style.display = 'none';
            }
        }

        // ====== WebSocket ======
        function send(msg) {
            const enriched = { ...msg, user: userId, userName: userName };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(enriched));
                return true;
            }
            return false;
        }

        function addTodo() {
            const text = document.getElementById('todo-input').value.trim();
            if (!text) return;
            const dueDate = document.getElementById('due-input').value || null;
            if (send({ type: 'add', text, dueDate, priority: selectedPriority, userName })) {
                document.getElementById('todo-input').value = '';
                document.getElementById('due-input').value = '';
                selectedPriority = null;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.classList.remove('active'));
                toast('任务已添加', 'success', { title: '✓ 添加成功' });
            } else {
                toast('未连接到服务器', 'error');
            }
        }

        // ====== 事件 ======
        document.getElementById('add-btn').addEventListener('click', addTodo);
        document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
        document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; render(); });
        document.querySelectorAll('.chip[data-prio]').forEach(c => {
            c.addEventListener('click', () => {
                document.querySelectorAll('.chip[data-prio]').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                selectedPriority = c.dataset.prio;
            });
        });
        document.querySelectorAll('.filter-tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                currentFilter = t.dataset.filter;
                render();
            });
        });

        document.getElementById('todo-list').addEventListener('click', e => {
            const card = e.target.closest('.todo-card');
            if (!card) return;
            const id = card.dataset.id;
            if (e.target.matches('[data-action="toggle"]')) {
                send({ type: 'update', id, updates: { completed: e.target.checked }, userName });
            } else if (e.target.closest('[data-action="delete"]')) {
                const todo = todos.find(t => t.id === id);
                send({ type: 'delete', id, userName });
                if (todo) {
                    toast(`已删除「${todo.text.slice(0, 20)}」`, 'info', {
                        title: '已删除',
                        action: {
                            label: '撤销',
                            handler: () => {
                                send({ type: 'add', text: todo.text, priority: todo.priority, dueDate: todo.dueDate, userName });
                                toast('已恢复', 'success');
                            }
                        },
                        duration: 6000
                    });
                }
            }
        });

        function setStatus(status, text) {
            const badge = document.getElementById('conn-badge');
            const txt = document.getElementById('conn-text');
            badge.className = 'connection-badge ' + status;
            txt.textContent = text;
            applyUserState();
        }

        function applyUserState() {
            const banner = document.getElementById('name-banner');
            const addCard = document.getElementById('add-card');
            const toolbar = document.getElementById('toolbar');
            const hasName = !!(userName && userName.trim());
            const online = ws && ws.readyState === WebSocket.OPEN;
            if (hasName) {
                banner.classList.remove('show');
                [addCard, toolbar].forEach(el => el.classList.remove('locked'));
                document.getElementById('todo-input').disabled = !online;
                document.getElementById('add-btn').disabled = !online;
                document.getElementById('due-input').disabled = !online;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.disabled = !online);
            } else {
                banner.classList.add('show');
                [addCard, toolbar].forEach(el => el.classList.add('locked'));
                document.getElementById('todo-input').disabled = true;
                document.getElementById('add-btn').disabled = true;
                document.getElementById('due-input').disabled = true;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.disabled = true);
            }
        }

        function connect() {
            let url = wsUrl.trim();
            if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
            else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);
            setStatus('connecting', '连接中...');
            clearTimeout(reconnectTimer);
            try { ws = new WebSocket(url); } catch (e) { setStatus('disconnected', '连接失败'); scheduleReconnect(); return; }
            ws.onopen = () => { setStatus('connected', '已连接'); send({ type: 'hello', userName }); };
            ws.onmessage = e => { try { handleServerMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
            ws.onerror = e => console.error('WS error', e);
            ws.onclose = () => { setStatus('disconnected', '已断开'); scheduleReconnect(); };
        }
        function scheduleReconnect() { clearTimeout(reconnectTimer); reconnectTimer = setTimeout(connect, 3000); }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'state': todos = Array.isArray(msg.todos) ? msg.todos : []; render(); break;
                case 'added': if (!todos.some(t => t.id === msg.todo.id)) { todos.push(msg.todo); render(); } break;
                case 'updated': { const idx = todos.findIndex(t => t.id === msg.todo.id); if (idx >= 0) { todos[idx] = msg.todo; render(); } break; }
                case 'deleted': todos = todos.filter(t => t.id !== msg.id); render(); break;
                case 'cleared': todos = []; render(); break;
                case 'online-list': renderOnlineList(msg.users || []); break;
            }
        }

        function renderOnlineList(users) {
            onlineUsers = users;
            const list = document.getElementById('online-list');
            const count = document.getElementById('online-count');
            count.textContent = users.length;
            list.innerHTML = users.map(u => {
                const isMe = u.id === userId;
                return `<span class="online-user" title="${escapeHtml(u.name)}${u.ip ? ' · ' + escapeHtml(u.ip) : ''}">
                    <span class="avatar" style="background:${getUserColor(u.id)}">${escapeHtml(getInitial(u.name, u.id))}</span>
                    ${escapeHtml(u.name)}${isMe ? '<span class="me-tag">我</span>' : ''}
                </span>`;
            }).join('');
        }

        // ====== 设置模态框 ======
        const modal = document.getElementById('settings-modal');
        const userNameInput = document.getElementById('user-name-input');
        const wsUrlInput = document.getElementById('ws-url-input');
        const requiredHint = document.getElementById('required-hint');

        function showModal(required = false) {
            modalIsRequired = required;
            userNameInput.value = userName || '';
            wsUrlInput.value = (wsUrl === defaultWsUrl ? '' : wsUrl);
            document.getElementById('default-url-hint').textContent = defaultWsUrl;
            document.getElementById('danger-section').style.display = userName ? 'block' : 'none';
            if (required) {
                modal.classList.add('required', 'required-mode');
                requiredHint.style.display = 'block';
            } else {
                modal.classList.remove('required', 'required-mode');
                requiredHint.style.display = 'none';
            }
            modal.classList.add('active');
            setTimeout(() => userNameInput.focus(), 50);
        }
        function hideModal() { if (modalIsRequired) return; modal.classList.remove('active'); }

        document.getElementById('conn-badge').addEventListener('click', () => showModal(false));
        document.getElementById('settings-btn').addEventListener('click', () => showModal(false));
        document.getElementById('open-widget-btn').addEventListener('click', openWidget);

        function openWidget() {
            // 计算右下角位置
            const w = 340, h = 520;
            const left = screen.width - w - 20;
            const top = screen.height - h - 60;
            const features = 'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',resizable=yes,scrollbars=no';
            const win = window.open('/widget.html', 'todo-widget-' + Date.now(), features);
            if (!win) {
                toast('请允许浏览器弹出窗口', 'error', { title: '⚠ 被拦截' });
            } else {
                toast('桌面小组件已打开', 'success', { title: '📌 小窗已启动' });
            }
        }
        document.getElementById('modal-cancel').addEventListener('click', hideModal);
        document.getElementById('modal-connect').addEventListener('click', () => {
            const newName = userNameInput.value.trim();
            if (modalIsRequired && !newName) { userNameInput.focus(); return; }
            if (newName !== userName) {
                userName = newName;
                if (newName) localStorage.setItem('todo_user_name', userName);
                else localStorage.removeItem('todo_user_name');
                updateUserBadge();
                applyUserState();
            }
            const url = wsUrlInput.value.trim();
            wsUrl = url || defaultWsUrl;
            if (url) localStorage.setItem('todo_ws_url', wsUrl);
            else localStorage.removeItem('todo_ws_url');
            modalIsRequired = false;
            hideModal();
            if (ws) { try { ws.close(); } catch(e){} }
            connect();
        });
        document.getElementById('banner-set-name').addEventListener('click', () => showModal(true));
        document.getElementById('clear-my-todos').addEventListener('click', () => {
            if (confirm('确定要清空你所有的任务吗？此操作不可撤销！')) {
                send({ type: 'clear' });
                toast('已清空', 'success');
            }
        });
        userNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('modal-connect').click(); });
        modal.addEventListener('click', e => { if (e.target === modal) hideModal(); });

        // ====== 启动 ======
        // 全局错误捕获
        window.addEventListener('error', e => {
            console.error('[全局错误]', e.message, 'at', (e.filename || '?') + ':' + e.lineno + ':' + e.colno);
        });
        try {
            updateUserBadge();
            applyUserState();
            connect();
            render();
            setInterval(render, 60000);
            if (!userName) setTimeout(() => showModal(true), 600);
        } catch (e) {
            console.error('[启动失败]', e);
        }

        // ====== Tab 切换 ======
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            const todoEl = document.getElementById('tab-todo');
            const newsEl = document.getElementById('tab-news');
            if (todoEl) todoEl.style.display = tab === 'todo' ? 'block' : 'none';
            if (newsEl) newsEl.style.display = tab === 'news' ? 'block' : 'none';
            // 资讯 tab 时隐藏右下角安装按钮（避免遮挡）
            const installBtn = document.getElementById('install-btn');
            if (installBtn) installBtn.style.display = (tab === 'news') ? 'none' : '';
            if (tab === 'news') {
                // 每次切换到资讯都重新加载（避免状态不一致）
                loadNews();
            }
        }
        // 更新 todo tab 数量
        function updateTabCount() {
            const el = document.getElementById('tab-todo-count');
            if (el) el.textContent = todos.filter(t => !t.completed).length;
        }
        const _origRender = render;
        render = function() { _origRender(); updateTabCount(); };

        // ====== 新闻模块 ======
        let newsSource = 'hn';
        let newsCategory = 'top';

        function timeAgo(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return '刚刚';
            if (m < 60) return m + '分钟前';
            const h = Math.floor(m / 60);
            if (h < 24) return h + '小时前';
            const d = Math.floor(h / 24);
            if (d < 7) return d + '天前';
            return new Date(iso).toLocaleDateString('zh-CN');
        }

        async function loadNews() {
            try {
                const list = document.getElementById('news-list');
                const meta = document.getElementById('news-meta');
                const refreshBtn = document.getElementById('news-refresh');
                if (!list || !meta) {
                    console.error('[News] 元素未找到');
                    return;
                }
                newsSource = document.getElementById('news-source')?.value || 'hn';
                newsCategory = document.getElementById('news-category')?.value || 'top';
                refreshBtn?.classList.add('spinning');
                list.innerHTML = '<li class="news-empty"><div style="font-size:32px;margin-bottom:8px;opacity:0.5">⏳</div>加载中...</li>';
                meta.textContent = '加载中...';
                const url = `/api/news?source=${encodeURIComponent(newsSource)}&category=${encodeURIComponent(newsCategory)}&t=${Date.now()}`;
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data || !Array.isArray(data.articles) || data.articles.length === 0) {
                    list.innerHTML = `
                        <li class="news-empty">
                            <div style="font-size:32px;margin-bottom:8px;opacity:0.5">📭</div>
                            <div>暂无新闻</div>
                        </li>`;
                    meta.textContent = '共 0 条';
                    return;
                }
                list.innerHTML = data.articles.map((a, i) => {
                    const rankCls = i < 3 ? 'top' + (i + 1) : '';
                    const time = a?.publishedAt || a?.time || '';
                    return `
                    <li>
                        <a class="news-item" href="${escapeAttr(a?.url || '#')}" target="_blank" rel="noopener">
                            <div class="news-item-rank ${rankCls}">${i + 1}</div>
                            <div class="news-item-body">
                                <div class="news-item-title">${escapeHtml(a?.title || '(无标题)')}</div>
                                <div class="news-item-meta">
                                    <span class="news-item-source">${escapeHtml(a?.sourceIcon || '📰')} ${escapeHtml(a?.source || '')}</span>
                                    ${a?.author ? `<span>👤 ${escapeHtml(a.author)}</span>` : ''}
                                    <span>🕐 ${timeAgo(time)}</span>
                                    ${a?.score ? `<span>⬆ ${a.score}</span>` : ''}
                                    ${a?.comments ? `<span>💬 ${a.comments}</span>` : ''}
                                </div>
                            </div>
                        </a>
                    </li>`;
                }).join('');
                const sourceName = data.sources?.[data.source]?.name || data.source || 'News';
                meta.innerHTML = `共 <strong>${data.count || 0}</strong> 条 · 来源 ${escapeHtml(sourceName)}${data.cached ? ' · 📦 缓存' : ''}`;
                console.log('[News] 渲染完成:', data.articles.length, '条');
            } catch (e) {
                console.error('[News] 加载失败:', e);
                const list = document.getElementById('news-list');
                if (list) {
                    list.innerHTML = `<li class="news-error">❌ 加载失败：${escapeHtml(e.message)}<br><br><button onclick="loadNews()" style="margin-top:8px;padding:6px 14px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:white;cursor:pointer">重试</button></li>`;
                }
            } finally {
                const refreshBtn = document.getElementById('news-refresh');
                refreshBtn?.classList.remove('spinning');
            }
        }

        document.getElementById('news-source')?.addEventListener('change', loadNews);
        document.getElementById('news-category')?.addEventListener('change', loadNews);
        document.getElementById('news-refresh')?.addEventListener('click', loadNews);
    </script>
</body>
</html>
