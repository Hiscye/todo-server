<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代办清单 · v1.4.0</title>
    <style>
        :root {
            --c-bg: #f5f5f7;
            --c-surface: #ffffff;
            --c-surface-2: #fafafc;
            --c-border: #e5e7eb;
            --c-border-strong: #d1d5db;
            --c-text: #111827;
            --c-text-2: #4b5563;
            --c-text-3: #9ca3af;
            --c-primary: #6366f1;
            --c-primary-hover: #4f46e5;
            --c-primary-soft: #eef2ff;
            --c-success: #10b981;
            --c-warning: #f59e0b;
            --c-danger: #ef4444;
            --c-danger-soft: #fee2e2;
            --c-prio-high: #ef4444;
            --c-prio-high-bg: #fef2f2;
            --c-prio-medium: #f59e0b;
            --c-prio-medium-bg: #fffbeb;
            --c-prio-low: #10b981;
            --c-prio-low-bg: #f0fdf4;
            --c-overdue: #dc2626;
            --c-today: #ea580c;
            --c-soon: #ca8a04;
            --c-upcoming: #16a34a;
            --c-future: #6b7280;
            --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
            --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
            --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
            --r-full: 9999px;
            --sh-sm: 0 1px 2px rgba(0,0,0,0.05);
            --sh-md: 0 4px 12px rgba(0,0,0,0.08);
            --sh-lg: 0 10px 30px rgba(0,0,0,0.10);
            --sh-xl: 0 25px 60px rgba(0,0,0,0.15);
            --ff: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            --t-fast: 0.15s ease;
            --t-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --t-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: var(--ff);
            color: var(--c-text);
            min-height: 100vh;
            padding: var(--sp-6) var(--sp-4);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
            background-color: #1a1033;
        }
        /* 🎨 花哨背景：紫色湖泊 + 动态渐变 + 几何图案叠加 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?w=1920&q=80&auto=format');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -3;
            filter: brightness(0.85) saturate(1.2);
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(at 20% 30%, hsla(280, 95%, 70%, 0.4) 0px, transparent 50%),
                radial-gradient(at 80% 70%, hsla(330, 95%, 70%, 0.35) 0px, transparent 50%),
                radial-gradient(at 50% 100%, hsla(220, 90%, 65%, 0.3) 0px, transparent 50%),
                radial-gradient(at 90% 10%, hsla(45, 90%, 70%, 0.2) 0px, transparent 40%);
            z-index: -2;
            animation: meshMove 20s ease-in-out infinite;
            mix-blend-mode: screen;
        }
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(2%, -2%) scale(1.05); }
            66% { transform: translate(-2%, 1%) scale(0.98); }
        }
        /* 装饰光斑 */
        body > .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }
        .orb-1 { width: 300px; height: 300px; background: hsla(280, 90%, 70%, 0.4); top: 10%; left: 5%; animation: float1 15s ease-in-out infinite; }
        .orb-2 { width: 400px; height: 400px; background: hsla(330, 90%, 70%, 0.3); bottom: 5%; right: 5%; animation: float2 18s ease-in-out infinite; }
        .orb-3 { width: 250px; height: 250px; background: hsla(45, 95%, 75%, 0.3); top: 50%; right: 30%; animation: float3 20s ease-in-out infinite; }
        @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(40px, -30px); } }
        @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 40px); } }
        @keyframes float3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, 30px); } }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input, textarea, select { font-family: inherit; outline: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: var(--r-full); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        .app { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--r-xl);
            padding: var(--sp-5) var(--sp-6);
            margin-bottom: var(--sp-5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            flex-wrap: wrap;
            color: white;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(245, 87, 108, 0.4);
        }
        .header-spacer { flex: 1; }
        .header-actions { display: flex; align-items: center; gap: var(--sp-2); }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            transition: all var(--t-fast);
            font-size: 16px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
        .connection-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            border-radius: var(--r-full);
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            cursor: pointer;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--c-warning);
            box-shadow: 0 0 8px currentColor;
        }
        .connection-badge.connected .status-dot { background: #4ade80; }
        .connection-badge.connecting .status-dot { background: #fbbf24; animation: pulseDot 1.2s infinite; }
        .connection-badge.disconnected .status-dot { background: #f87171; }
        @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--sp-3);
            margin-bottom: var(--sp-5);
        }
        @media (max-width: 600px) { .dashboard { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--r-lg);
            padding: var(--sp-4);
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
            transition: all var(--t-base);
        }
        .stat-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.25); }
        .stat-icon { font-size: 18px; margin-bottom: var(--sp-1); }
        .stat-value { font-size: 26px; font-weight: 700; line-height: 1.2; }
        .stat-label { font-size: 11px; opacity: 0.85; margin-top: 2px; }
        .add-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: var(--r-xl);
            padding: var(--sp-4);
            margin-bottom: var(--sp-4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            color: white;
        }
        .add-card:focus-within { background: rgba(255,255,255,0.28); }
        .add-row { display: flex; gap: var(--sp-2); align-items: center; }
        .add-input {
            flex: 1; border: none; background: transparent;
            font-size: 15px; color: white;
            padding: var(--sp-2) var(--sp-3);
        }
        .add-input::placeholder { color: rgba(255,255,255,0.6); }
        .add-meta {
            display: flex; gap: var(--sp-2);
            margin-top: var(--sp-3); padding-top: var(--sp-3);
            border-top: 1px dashed rgba(255,255,255,0.25);
            flex-wrap: wrap; align-items: center;
        }
        .add-meta-label { font-size: 12px; color: rgba(255,255,255,0.8); margin-right: var(--sp-1); }
        .chip-group { display: inline-flex; gap: 4px; flex-wrap: wrap; }
        .chip {
            padding: 4px 10px; font-size: 12px;
            border-radius: var(--r-full);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all var(--t-fast);
            display: inline-flex; align-items: center; gap: 4px;
            backdrop-filter: blur(10px);
        }
        .chip:hover { background: rgba(255,255,255,0.3); }
        .chip.active { background: white; color: var(--c-primary); border-color: white; font-weight: 600; }
        .chip.prio-high.active { background: #fca5a5; color: #7f1d1d; border-color: #fca5a5; }
        .chip.prio-medium.active { background: #fcd34d; color: #78350f; border-color: #fcd34d; }
        .chip.prio-low.active { background: #6ee7b7; color: #064e3b; border-color: #6ee7b7; }
        .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
        .chip.prio-high .chip-dot { background: #fca5a5; }
        .chip.prio-medium .chip-dot { background: #fcd34d; }
        .chip.prio-low .chip-dot { background: #6ee7b7; }
        .chip.active .chip-dot { background: currentColor; opacity: 0.5; }
        .chip-date {
            border: 1px solid rgba(255,255,255,0.3);
            padding: 3px 8px;
            border-radius: var(--r-sm);
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            color: white;
            color-scheme: dark;
        }
        .add-submit {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-radius: var(--r-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(245, 87, 108, 0.4);
            transition: all var(--t-fast);
        }
        .add-submit:hover:not(:disabled) { transform: translateY(-1px) scale(1.05); }
        .add-submit:disabled { background: rgba(255,255,255,0.3); box-shadow: none; cursor: not-allowed; }
        .toolbar {
            display: flex; align-items: center; gap: var(--sp-3);
            margin-bottom: var(--sp-4); flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 200px; }
        .search-input {
            width: 100%;
            padding: var(--sp-2) var(--sp-3) var(--sp-2) 36px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-full);
            font-size: 13px; color: white;
            transition: all var(--t-fast);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .search-input:focus { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.5); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.7); font-size: 14px; pointer-events: none; }
        .select-control {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-full);
            padding: 5px 12px;
            font-size: 12px;
            color: white;
            cursor: pointer;
        }
        .select-control option { background: #1a1033; color: white; }
        .filter-tabs {
            display: flex;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: var(--r-full);
            padding: 3px; gap: 2px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 5px 12px; font-size: 12px;
            color: rgba(255,255,255,0.85);
            border-radius: var(--r-full);
            transition: all var(--t-fast);
            white-space: nowrap;
        }
        .filter-tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .filter-tab.active { background: white; color: var(--c-primary); font-weight: 600; }
        .tag-filter-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: var(--sp-4);
            align-items: center;
        }
        .tag-filter-label { font-size: 12px; color: rgba(255,255,255,0.85); margin-right: 4px; }
        .tag-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-full);
            font-size: 12px;
            color: white;
            cursor: pointer;
            transition: all var(--t-fast);
            backdrop-filter: blur(10px);
        }
        .tag-chip:hover { background: rgba(255,255,255,0.3); }
        .tag-chip.active { background: white; color: var(--c-primary); font-weight: 600; }
        .todo-list { list-style: none; display: flex; flex-direction: column; gap: var(--sp-3); }
        .todo-card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            color: white;
            transition: all var(--t-base);
            animation: cardIn var(--t-slow) ease;
        }
        .todo-card:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,0,0,0.15); }
        .todo-card.expanded { background: rgba(255,255,255,0.28); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .todo-card.priority-high { border-left: 4px solid #fca5a5; }
        .todo-card.priority-medium { border-left: 4px solid #fcd34d; }
        .todo-card.priority-low { border-left: 4px solid #6ee7b7; }
        .todo-main {
            display: flex; align-items: center; gap: var(--sp-3);
            padding: var(--sp-4); cursor: pointer;
        }
        .todo-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #f5576c; flex-shrink: 0; }
        .todo-body { flex: 1; min-width: 0; }
        .todo-text {
            font-size: 15px; font-weight: 500;
            word-break: break-word;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .todo-card.completed .todo-text { text-decoration: line-through; opacity: 0.6; }
        .todo-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
        .meta-pill {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 2px 8px; font-size: 11px;
            border-radius: var(--r-full);
            font-weight: 500;
            backdrop-filter: blur(10px);
        }
        .meta-pill.prio-high { background: rgba(252, 165, 165, 0.9); color: #7f1d1d; }
        .meta-pill.prio-medium { background: rgba(252, 211, 77, 0.9); color: #78350f; }
        .meta-pill.prio-low { background: rgba(110, 231, 183, 0.9); color: #064e3b; }
        .meta-pill.due-overdue { background: rgba(248, 113, 113, 0.95); color: white; font-weight: 700; }
        .meta-pill.due-today { background: rgba(251, 146, 60, 0.95); color: white; font-weight: 700; }
        .meta-pill.due-soon { background: rgba(252, 211, 77, 0.9); color: #78350f; }
        .meta-pill.due-upcoming { background: rgba(110, 231, 183, 0.85); color: #064e3b; }
        .meta-pill.due-future { background: rgba(255,255,255,0.25); color: rgba(255,255,255,0.85); }
        .meta-tag {
            background: rgba(255,255,255,0.3);
            color: white;
            font-weight: 500;
        }
        .meta-author { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,255,255,0.8); }
        .meta-author .avatar {
            width: 16px; height: 16px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 9px; font-weight: 700;
        }
        .todo-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .todo-action-btn {
            width: 28px; height: 28px;
            border-radius: var(--r-sm);
            color: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all var(--t-fast);
        }
        .todo-action-btn:hover { background: rgba(255,255,255,0.2); color: white; }
        .todo-expand-icon {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            transition: transform var(--t-base);
            display: inline-block;
            padding: 0 4px;
        }
        .todo-card.expanded .todo-expand-icon { transform: rotate(180deg); }
        .todo-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--t-slow);
            background: rgba(0,0,0,0.15);
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .todo-card.expanded .todo-details { max-height: 600px; }
        .todo-details-inner { padding: var(--sp-4); }
        .detail-section { margin-bottom: var(--sp-3); }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .detail-textarea {
            width: 100%;
            min-height: 60px;
            padding: var(--sp-2) var(--sp-3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--r-sm);
            font-size: 13px;
            resize: vertical;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .detail-textarea::placeholder { color: rgba(255,255,255,0.5); }
        .detail-textarea:focus { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
        .tag-input-row {
            display: flex; flex-wrap: wrap; gap: 4px;
            align-items: center;
        }
        .tag-existing {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px;
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--r-full);
            font-size: 12px;
            color: white;
        }
        .tag-existing .remove { cursor: pointer; opacity: 0.6; font-size: 10px; }
        .tag-existing .remove:hover { opacity: 1; }
        .tag-input {
            flex: 1; min-width: 100px;
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--r-full);
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .tag-input::placeholder { color: rgba(255,255,255,0.5); }
        .tag-input:focus { background: rgba(255,255,255,0.2); }
        .tag-suggestions {
            display: flex; gap: 4px; flex-wrap: wrap;
            margin-top: 4px;
        }
        .tag-suggestion {
            font-size: 11px;
            padding: 2px 8px;
            background: rgba(255,255,255,0.15);
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: var(--r-full);
            color: rgba(255,255,255,0.8);
            cursor: pointer;
        }
        .tag-suggestion:hover { background: rgba(255,255,255,0.25); color: white; }
        .online-panel {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: var(--r-lg);
            padding: var(--sp-3) var(--sp-4);
            margin-bottom: var(--sp-4);
            color: white;
        }
        .online-title {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600;
            margin-bottom: var(--sp-2);
        }
        .online-pulse {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.3);
            animation: pulseDot 1.6s infinite;
        }
        @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.3); } 50% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0.1); } }
        .online-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .online-user {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px 4px 4px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--r-full);
            font-size: 12px; color: white;
            cursor: help;
        }
        .online-user .avatar {
            width: 22px; height: 22px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 11px; font-weight: 700;
        }
        .online-user .me-tag {
            background: #f5576c; color: white;
            font-size: 9px; padding: 1px 5px;
            border-radius: var(--r-full);
            margin-left: 2px; font-weight: 700;
        }
        .online-empty { color: rgba(255,255,255,0.6); font-size: 12px; padding: 4px 0; }
        .empty-state { text-align: center; padding: var(--sp-10) var(--sp-6); color: rgba(255,255,255,0.7); }
        .empty-illustration { font-size: 64px; margin-bottom: var(--sp-3); opacity: 0.7; }
        .empty-title { font-size: 16px; margin-bottom: var(--sp-2); font-weight: 500; color: white; }
        .empty-hint { font-size: 13px; }
        .toast-container {
            position: fixed; top: 20px; right: 20px;
            z-index: 9999;
            display: flex; flex-direction: column; gap: var(--sp-2);
            pointer-events: none;
        }
        .toast {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--r-md);
            padding: var(--sp-3) var(--sp-4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: var(--sp-3);
            min-width: 280px; max-width: 400px;
            pointer-events: auto;
            border-left: 4px solid var(--c-primary);
            color: white;
            animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.success { border-left-color: #4ade80; }
        .toast.error { border-left-color: #f87171; }
        .toast-action {
            font-size: 12px; color: #f093fb;
            font-weight: 600; padding: 2px 8px;
            border-radius: var(--r-sm);
            background: rgba(240, 147, 251, 0.15);
        }
        .toast-close { color: rgba(255,255,255,0.6); padding: 0 4px; font-size: 16px; }
        .toast.removing { animation: toastOut 0.3s forwards; }
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 100; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: linear-gradient(135deg, #2a1a4a, #1a1033);
            color: white;
            border-radius: var(--r-xl);
            padding: var(--sp-6);
            width: 100%; max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal h3 { font-size: 18px; margin-bottom: var(--sp-2); }
        .modal p { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: var(--sp-3); line-height: 1.6; }
        .modal p code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: var(--r-sm); font-size: 12px; color: #f093fb; }
        .modal input {
            width: 100%; padding: var(--sp-3);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: var(--r-md);
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: var(--sp-3);
        }
        .modal input::placeholder { color: rgba(255,255,255,0.5); }
        .modal input:focus { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
        .modal-section { margin-bottom: var(--sp-4); }
        .modal-section-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
        .modal-btn { padding: var(--sp-2) var(--sp-4); border-radius: var(--r-md); font-size: 14px; font-weight: 500; }
        .modal-btn.primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .modal-btn.secondary { background: rgba(255,255,255,0.1); color: white; }
        .modal-overlay.required .modal { border: 2px solid #f87171; }
        .modal-overlay.required .modal h3::after { content: ' *必填'; color: #f87171; font-size: 13px; font-weight: normal; }
        .modal.required-mode .modal-btn.secondary { display: none; }
        .add-card.locked, .toolbar.locked { opacity: 0.5; pointer-events: none; }
        .name-required-banner {
            display: none;
            background: rgba(248, 113, 113, 0.25);
            border: 1px solid rgba(248, 113, 113, 0.5);
            color: white;
            padding: var(--sp-3) var(--sp-4);
            border-radius: var(--r-lg);
            font-size: 13px;
            margin-bottom: var(--sp-4);
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .name-required-banner.show { display: flex; align-items: center; justify-content: center; gap: var(--sp-2); }
        .name-required-banner button { background: #f87171; color: white; padding: 4px 12px; border-radius: var(--r-md); font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="app">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📋</div>
                <span>代办清单</span>
            </div>
            <div class="header-spacer"></div>
            <div class="header-actions">
                <div class="connection-badge" id="conn-badge" title="点击设置">
                    <span class="status-dot"></span>
                    <span id="conn-text">连接中</span>
                </div>
                <button class="icon-btn" id="settings-btn" title="设置">⚙</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="d-total">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="d-done">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="d-today">0</div>
                <div class="stat-label">今日待办</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="d-rate">0%</div>
                <div class="stat-label">完成率</div>
            </div>
        </div>

        <div class="name-required-banner" id="name-banner">
            ⚠️ 请先设置你的名字才能添加任务
            <button id="banner-set-name">立即设置</button>
        </div>

        <div class="add-card" id="add-card">
            <div class="add-row">
                <input type="text" class="add-input" id="todo-input" placeholder="想做什么？输入任务按回车..." maxlength="200">
                <button class="add-submit" id="add-btn" title="添加">+</button>
            </div>
            <div class="add-meta">
                <span class="add-meta-label">📅</span>
                <input type="date" class="chip-date" id="due-input">
                <span class="add-meta-label">🎯</span>
                <div class="chip-group" id="priority-group">
                    <button class="chip prio-high" data-prio="high"><span class="chip-dot"></span>高</button>
                    <button class="chip prio-medium" data-prio="medium"><span class="chip-dot"></span>中</button>
                    <button class="chip prio-low" data-prio="low"><span class="chip-dot"></span>低</button>
                </div>
                <span class="add-meta-label">🏷️</span>
                <input type="text" class="chip-date" id="tag-input" placeholder="标签（回车添加）" style="min-width: 140px; max-width: 200px;">
            </div>
        </div>

        <div class="toolbar" id="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="搜索任务、标签、描述...">
            </div>
            <select class="select-control" id="sort-select">
                <option value="created-desc">📅 最新创建</option>
                <option value="created-asc">📅 最旧优先</option>
                <option value="due-asc">⏰ 截止最近</option>
                <option value="due-desc">⏰ 截止最远</option>
                <option value="priority-desc">🔥 优先级高→低</option>
                <option value="priority-asc">🌱 优先级低→高</option>
                <option value="title-asc">🔤 标题 A-Z</option>
            </select>
            <div class="filter-tabs" id="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="today">今天</button>
                <button class="filter-tab" data-filter="week">本周</button>
                <button class="filter-tab" data-filter="overdue">已过期</button>
                <button class="filter-tab" data-filter="completed">已完成</button>
            </div>
        </div>

        <div class="tag-filter-bar" id="tag-filter-bar" style="display:none">
            <span class="tag-filter-label">🏷️ 标签筛选：</span>
            <div id="tag-filter-list" style="display:flex; gap:6px; flex-wrap:wrap"></div>
        </div>

        <div class="online-panel">
            <div class="online-title">
                <span class="online-pulse"></span>
                <span>在线 <strong id="online-count">0</strong> 人</span>
            </div>
            <div class="online-list" id="online-list">
                <div class="online-empty">连接中...</div>
            </div>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙ 设置</h3>
            <div class="modal-section">
                <label class="modal-section-label">👤 你的名字</label>
                <input type="text" id="user-name-input" placeholder="例如：小明" maxlength="20">
            </div>
            <div class="modal-section">
                <label class="modal-section-label">🌐 服务器地址</label>
                <p style="font-size: 12px;">默认：<code id="default-url-hint"></code></p>
                <input type="text" id="ws-url-input" placeholder="留空使用同源">
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="modal-cancel">取消</button>
                <button class="modal-btn primary" id="modal-connect">保存</button>
            </div>
            <p id="required-hint" style="display:none; color: #f87171; font-size: 12px; margin-top: 8px;">⚠️ 必须填写名字才能使用</p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // ====== 全局状态 ======
        let todos = [];
        let onlineUsers = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let sortBy = 'created-desc';
        let activeTagFilter = null;
        let expandedTodos = new Set();
        let ws = null;
        const defaultWsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
        let wsUrl = localStorage.getItem('todo_ws_url') || defaultWsUrl;
        let reconnectTimer = null;
        let userId = localStorage.getItem('todo_user_id');
        if (!userId) { userId = 'u-' + Math.random().toString(36).slice(2, 8); localStorage.setItem('todo_user_id', userId); }
        let userName = localStorage.getItem('todo_user_name') || '';
        let modalIsRequired = false;
        let selectedPriority = null;
        let pendingTags = [];

        // 标签预设
        const TAG_PRESETS = ['工作', '生活', '学习', '紧急', '个人', '团队', '购物', '健康'];

        // ====== 工具函数 ======
        const AVATAR_COLORS = ['#f56565','#ed8936','#ecc94b','#48bb78','#38b2ac','#4299e1','#667eea','#9f7aea','#ed64a6','#a0aec0'];
        function hashCode(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i) | 0; return Math.abs(h); }
        function getUserColor(id) { return !id ? '#a0aec0' : AVATAR_COLORS[hashCode(id) % AVATAR_COLORS.length]; }
        function getInitial(name, id) { if (name && name.trim()) return name.trim()[0].toUpperCase(); if (id) return id[0].toUpperCase(); return '?'; }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }
        function formatRelative(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return '刚刚';
            if (m < 60) return m + ' 分钟前';
            const h = Math.floor(m / 60);
            if (h < 24) return h + ' 小时前';
            const d = Math.floor(h / 24);
            if (d < 7) return d + ' 天前';
            return new Date(iso).toLocaleDateString('zh-CN');
        }
        function getDueStatus(dueDate) {
            if (!dueDate) return null;
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const due = new Date(dueDate + 'T00:00:00');
            if (isNaN(due.getTime())) return null;
            const diff = Math.round((due - today) / 86400000);
            if (diff < 0) return { cls: 'due-overdue', icon: '⚠', text: `已过期 ${-diff} 天` };
            if (diff === 0) return { cls: 'due-today', icon: '🔥', text: '今天到期' };
            if (diff === 1) return { cls: 'due-soon', icon: '⏰', text: '明天到期' };
            if (diff <= 3) return { cls: 'due-soon', icon: '⏰', text: `${diff} 天后` };
            if (diff <= 7) return { cls: 'due-upcoming', icon: '📅', text: `${diff} 天后` };
            return { cls: 'due-future', icon: '📅', text: `${due.getMonth()+1}/${due.getDate()}` };
        }
        const PRIO = { high: { cls: 'prio-high', icon: '🔴', text: '高', order: 3 }, medium: { cls: 'prio-medium', icon: '🟡', text: '中', order: 2 }, low: { cls: 'prio-low', icon: '🟢', text: '低', order: 1 } };
        const PRIO_ORDER = { high: 3, medium: 2, low: 1 };

        // ====== Toast 通知 ======
        function toast(msg, type = 'info', opts = {}) {
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = `
                <span class="toast-icon" style="font-size:18px;flex-shrink:0">${icons[type] || 'ℹ'}</span>
                <div class="toast-body" style="flex:1">
                    ${opts.title ? `<div style="font-size:13px;font-weight:600">${escapeHtml(opts.title)}</div>` : ''}
                    <div style="font-size:12px;opacity:0.85;margin-top:1px">${escapeHtml(msg)}</div>
                </div>
                ${opts.action ? `<button class="toast-action" data-act>${escapeHtml(opts.action.label)}</button>` : ''}
                <button class="toast-close">×</button>
            `;
            container.appendChild(t);
            const close = () => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); };
            t.querySelector('.toast-close').addEventListener('click', close);
            if (opts.action) t.querySelector('[data-act]').addEventListener('click', () => { opts.action.handler(); close(); });
            setTimeout(close, opts.duration || 3500);
        }

        // ====== 渲染 ======
        function sortTodos(arr) {
            const copy = [...arr];
            switch (sortBy) {
                case 'created-desc': copy.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)); break;
                case 'created-asc': copy.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt)); break;
                case 'due-asc': copy.sort((a, b) => {
                    if (!a.dueDate && !b.dueDate) return 0;
                    if (!a.dueDate) return 1;
                    if (!b.dueDate) return -1;
                    return a.dueDate.localeCompare(b.dueDate);
                }); break;
                case 'due-desc': copy.sort((a, b) => {
                    if (!a.dueDate && !b.dueDate) return 0;
                    if (!a.dueDate) return 1;
                    if (!b.dueDate) return -1;
                    return b.dueDate.localeCompare(a.dueDate);
                }); break;
                case 'priority-desc': copy.sort((a, b) => (PRIO_ORDER[b.priority] || 0) - (PRIO_ORDER[a.priority] || 0)); break;
                case 'priority-asc': copy.sort((a, b) => (PRIO_ORDER[a.priority] || 0) - (PRIO_ORDER[b.priority] || 0)); break;
                case 'title-asc': copy.sort((a, b) => a.text.localeCompare(b.text, 'zh')); break;
            }
            return copy;
        }

        function renderTodoCard(todo) {
            const isExpanded = expandedTodos.has(todo.id);
            const due = getDueStatus(todo.dueDate);
            const prioInfo = PRIO[todo.priority];
            const tags = todo.tags || [];

            const meta = [];
            if (prioInfo) meta.push(`<span class="meta-pill ${prioInfo.cls}">${prioInfo.icon} ${prioInfo.text}</span>`);
            if (due) meta.push(`<span class="meta-pill ${due.cls}">${due.icon} ${due.text}</span>`);
            tags.forEach(t => meta.push(`<span class="meta-pill meta-tag">#${escapeHtml(t)}</span>`));

            return `
                <li class="todo-card ${todo.completed ? 'completed' : ''} ${todo.priority ? 'priority-' + todo.priority : ''} ${isExpanded ? 'expanded' : ''}" data-id="${escapeAttr(todo.id)}">
                    <div class="todo-main" data-action="toggle-expand">
                        <input type="checkbox" class="todo-checkbox" data-action="toggle" ${todo.completed ? 'checked' : ''}>
                        <div class="todo-body">
                            <div class="todo-text">${escapeHtml(todo.text)}</div>
                            <div class="todo-meta">${meta.join('')}</div>
                        </div>
                        <div class="todo-actions">
                            <span class="todo-expand-icon">▾</span>
                            <button class="todo-action-btn" data-action="delete" title="删除">✕</button>
                        </div>
                    </div>
                    <div class="todo-details">
                        <div class="todo-details-inner">
                            <div class="detail-section">
                                <div class="detail-label">🏷️ 标签</div>
                                <div class="tag-input-row" data-field="tags">
                                    ${tags.map(t => `<span class="tag-existing">#${escapeHtml(t)}<span class="remove" data-remove-tag="${escapeAttr(t)}">✕</span></span>`).join('')}
                                    <input type="text" class="tag-input" placeholder="+ 添加标签（回车）" data-add-tag>
                                </div>
                                <div class="tag-suggestions">
                                    ${TAG_PRESETS.filter(p => !tags.includes(p)).slice(0, 5).map(p => `<span class="tag-suggestion" data-add-preset="${escapeAttr(p)}">+ ${p}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
            `;
        }

        function getAllTags() {
            const set = new Set();
            todos.forEach(t => (t.tags || []).forEach(tag => set.add(tag)));
            return Array.from(set);
        }

        function render() {
            const list = document.getElementById('todo-list');
            const filtered = todos.filter(t => {
                if (currentFilter === 'completed') return t.completed;
                if (currentFilter === 'today') {
                    if (t.completed) return false;
                    const due = getDueStatus(t.dueDate);
                    return due && due.cls === 'due-today';
                }
                if (currentFilter === 'week') {
                    if (t.completed) return false;
                    const due = getDueStatus(t.dueDate);
                    return due && ['due-today', 'due-soon', 'due-upcoming'].includes(due.cls);
                }
                if (currentFilter === 'overdue') {
                    if (t.completed) return false;
                    const due = getDueStatus(t.dueDate);
                    return due && due.cls === 'due-overdue';
                }
                if (activeTagFilter && !(t.tags || []).includes(activeTagFilter)) return false;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const inText = t.text.toLowerCase().includes(q);
                    const inTags = (t.tags || []).some(tag => tag.toLowerCase().includes(q));
                    if (!inText && !inTags) return false;
                }
                return true;
            });
            const sorted = sortTodos(filtered);

            if (sorted.length === 0) {
                const emptyIcon = searchQuery ? '🔍' : (currentFilter === 'completed' ? '🎉' : '📝');
                const emptyTitle = searchQuery ? '没找到匹配的任务' : (currentFilter === 'completed' ? '还没有完成的任务' : '还没有任务');
                const emptyHint = searchQuery ? '试试其他关键词' : '在输入框添加你的第一个任务吧';
                list.innerHTML = `<div class="empty-state"><div class="empty-illustration">${emptyIcon}</div><div class="empty-title">${emptyTitle}</div><div class="empty-hint">${emptyHint}</div></div>`;
            } else {
                list.innerHTML = sorted.map(renderTodoCard).join('');
            }
            updateDashboard();
            renderTagFilterBar();
        }

        function updateDashboard() {
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const today = todos.filter(t => {
                if (t.completed) return false;
                const due = getDueStatus(t.dueDate);
                return due && due.cls === 'due-today';
            }).length;
            const rate = total > 0 ? Math.round(done / total * 100) : 0;
            document.getElementById('d-total').textContent = total;
            document.getElementById('d-done').textContent = done;
            document.getElementById('d-today').textContent = today;
            document.getElementById('d-rate').textContent = rate + '%';
        }

        function renderTagFilterBar() {
            const allTags = getAllTags();
            const bar = document.getElementById('tag-filter-bar');
            const list = document.getElementById('tag-filter-list');
            if (allTags.length === 0) {
                bar.style.display = 'none';
                return;
            }
            bar.style.display = 'flex';
            list.innerHTML = allTags.map(t =>
                `<span class="tag-chip ${activeTagFilter === t ? 'active' : ''}" data-filter-tag="${escapeAttr(t)}">#${escapeHtml(t)}</span>`
            ).join('');
        }

        // ====== WebSocket ======
        function send(msg) {
            const enriched = { ...msg, user: userId, userName: userName };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(enriched));
                return true;
            }
            return false;
        }

        function addTodo() {
            const text = document.getElementById('todo-input').value.trim();
            if (!text) return;
            const dueDate = document.getElementById('due-input').value || null;
            const tags = [...pendingTags];
            if (send({ type: 'add', text, dueDate, priority: selectedPriority, tags, userName })) {
                document.getElementById('todo-input').value = '';
                document.getElementById('due-input').value = '';
                document.getElementById('tag-input').value = '';
                selectedPriority = null;
                pendingTags = [];
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.classList.remove('active'));
                toast('任务已添加', 'success', { title: '✓ 添加成功' });
            } else {
                toast('未连接到服务器', 'error');
            }
        }

        // ====== 事件 ======
        document.getElementById('add-btn').addEventListener('click', addTodo);
        document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
        document.getElementById('tag-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tag = e.target.value.trim();
                if (tag && !pendingTags.includes(tag) && pendingTags.length < 10) {
                    pendingTags.push(tag);
                    e.target.value = '';
                    updatePendingTagsDisplay();
                }
            }
        });

        function updatePendingTagsDisplay() {
            // 简化：直接在 tag-input 后显示
        }

        document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; render(); });
        document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; render(); });
        document.querySelectorAll('.chip[data-prio]').forEach(c => {
            c.addEventListener('click', () => {
                document.querySelectorAll('.chip[data-prio]').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                selectedPriority = c.dataset.prio;
            });
        });
        document.querySelectorAll('.filter-tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                currentFilter = t.dataset.filter;
                render();
            });
        });

        document.getElementById('todo-list').addEventListener('click', e => {
            const card = e.target.closest('.todo-card');
            if (!card) return;
            const id = card.dataset.id;

            if (e.target.matches('[data-action="toggle"]')) {
                e.stopPropagation();
                send({ type: 'update', id, updates: { completed: e.target.checked }, userName });
                return;
            }
            if (e.target.closest('[data-action="delete"]')) {
                e.stopPropagation();
                const todo = todos.find(t => t.id === id);
                send({ type: 'delete', id, userName });
                if (todo) {
                    toast(`已删除「${todo.text.slice(0, 20)}」`, 'info', {
                        title: '已删除',
                        action: {
                            label: '撤销',
                            handler: () => {
                                send({ type: 'add', text: todo.text, priority: todo.priority, dueDate: todo.dueDate, tags: todo.tags || [], userName });
                                toast('已恢复', 'success');
                            }
                        },
                        duration: 6000
                    });
                }
                return;
            }
            if (e.target.closest('[data-action="toggle-expand"]')) {
                if (expandedTodos.has(id)) expandedTodos.delete(id);
                else expandedTodos.add(id);
                card.classList.toggle('expanded');
                return;
            }
            const removeTag = e.target.dataset.removeTag;
            if (removeTag !== undefined) {
                e.stopPropagation();
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newTags = (todo.tags || []).filter(t => t !== removeTag);
                send({ type: 'update', id, updates: { tags: newTags }, userName });
                return;
            }
            const presetTag = e.target.dataset.addPreset;
            if (presetTag !== undefined) {
                e.stopPropagation();
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newTags = [...(todo.tags || [])];
                if (!newTags.includes(presetTag) && newTags.length < 10) {
                    newTags.push(presetTag);
                    send({ type: 'update', id, updates: { tags: newTags }, userName });
                }
                return;
            }
        });

        document.getElementById('todo-list').addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.target.matches('[data-add-tag]')) {
                e.preventDefault();
                const tag = e.target.value.trim();
                if (!tag) return;
                const card = e.target.closest('.todo-card');
                const id = card.dataset.id;
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const newTags = [...(todo.tags || [])];
                if (!newTags.includes(tag) && newTags.length < 10) {
                    newTags.push(tag);
                    send({ type: 'update', id, updates: { tags: newTags }, userName });
                }
            }
        });

        document.getElementById('tag-filter-list').addEventListener('click', e => {
            const tag = e.target.dataset.filterTag;
            if (tag) {
                activeTagFilter = activeTagFilter === tag ? null : tag;
                render();
            }
        });

        function setStatus(status, text) {
            const badge = document.getElementById('conn-badge');
            const txt = document.getElementById('conn-text');
            badge.className = 'connection-badge ' + status;
            txt.textContent = text;
            applyUserState();
        }

        function applyUserState() {
            const banner = document.getElementById('name-banner');
            const addCard = document.getElementById('add-card');
            const toolbar = document.getElementById('toolbar');
            const hasName = !!(userName && userName.trim());
            const online = ws && ws.readyState === WebSocket.OPEN;
            if (hasName) {
                banner.classList.remove('show');
                [addCard, toolbar].forEach(el => el.classList.remove('locked'));
                document.getElementById('todo-input').disabled = !online;
                document.getElementById('add-btn').disabled = !online;
                document.getElementById('due-input').disabled = !online;
                document.getElementById('tag-input').disabled = !online;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.disabled = !online);
            } else {
                banner.classList.add('show');
                [addCard, toolbar].forEach(el => el.classList.add('locked'));
                document.getElementById('todo-input').disabled = true;
                document.getElementById('add-btn').disabled = true;
                document.getElementById('due-input').disabled = true;
                document.getElementById('tag-input').disabled = true;
                document.querySelectorAll('.chip[data-prio]').forEach(c => c.disabled = true);
            }
        }

        function connect() {
            let url = wsUrl.trim();
            if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
            else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);
            setStatus('connecting', '连接中...');
            clearTimeout(reconnectTimer);
            try { ws = new WebSocket(url); } catch (e) { setStatus('disconnected', '连接失败'); scheduleReconnect(); return; }
            ws.onopen = () => { setStatus('connected', '已连接'); send({ type: 'hello', userName }); };
            ws.onmessage = e => { try { handleServerMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
            ws.onerror = e => console.error('WS error', e);
            ws.onclose = () => { setStatus('disconnected', '已断开'); scheduleReconnect(); };
        }
        function scheduleReconnect() { clearTimeout(reconnectTimer); reconnectTimer = setTimeout(connect, 3000); }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'state': todos = Array.isArray(msg.todos) ? msg.todos : []; render(); break;
                case 'added': if (!todos.some(t => t.id === msg.todo.id)) { todos.push(msg.todo); render(); } break;
                case 'updated': { const idx = todos.findIndex(t => t.id === msg.todo.id); if (idx >= 0) { todos[idx] = msg.todo; render(); } break; }
                case 'deleted': todos = todos.filter(t => t.id !== msg.id); render(); break;
                case 'cleared': todos = []; render(); break;
                case 'online': document.getElementById('online-count').textContent = msg.count; break;
                case 'online-list': renderOnlineList(msg.users || []); break;
            }
        }

        function renderOnlineList(users) {
            onlineUsers = users;
            const list = document.getElementById('online-list');
            const count = document.getElementById('online-count');
            count.textContent = users.length;
            if (users.length === 0) {
                list.innerHTML = '<div class="online-empty">只有你在线</div>';
                return;
            }
            list.innerHTML = users.map(u => {
                const isMe = u.id === userId;
                const initial = getInitial(u.name, u.id);
                const color = getUserColor(u.id);
                const tooltip = `${escapeHtml(u.name)} · IP: ${escapeHtml(u.ip || '?')}${isMe ? '（你）' : ''}`;
                return `<span class="online-user" title="${tooltip}">
                    <span class="avatar" style="background:${color}">${escapeHtml(initial)}</span>
                    ${escapeHtml(u.name)}${isMe ? '<span class="me-tag">我</span>' : ''}
                </span>`;
            }).join('');
        }

        const modal = document.getElementById('settings-modal');
        const userNameInput = document.getElementById('user-name-input');
        const wsUrlInput = document.getElementById('ws-url-input');
        const requiredHint = document.getElementById('required-hint');

        function showModal(required = false) {
            modalIsRequired = required;
            userNameInput.value = userName || '';
            wsUrlInput.value = (wsUrl === defaultWsUrl ? '' : wsUrl);
            document.getElementById('default-url-hint').textContent = defaultWsUrl;
            if (required) {
                modal.classList.add('required', 'required-mode');
                requiredHint.style.display = 'block';
            } else {
                modal.classList.remove('required', 'required-mode');
                requiredHint.style.display = 'none';
            }
            modal.classList.add('active');
            setTimeout(() => userNameInput.focus(), 50);
        }
        function hideModal() { if (modalIsRequired) return; modal.classList.remove('active'); }

        document.getElementById('conn-badge').addEventListener('click', () => showModal(false));
        document.getElementById('settings-btn').addEventListener('click', () => showModal(false));
        document.getElementById('modal-cancel').addEventListener('click', hideModal);
        document.getElementById('modal-connect').addEventListener('click', () => {
            const newName = userNameInput.value.trim();
            if (modalIsRequired && !newName) { userNameInput.focus(); return; }
            if (newName !== userName) {
                userName = newName;
                if (newName) localStorage.setItem('todo_user_name', userName);
                else localStorage.removeItem('todo_user_name');
                applyUserState();
            }
            const url = wsUrlInput.value.trim();
            wsUrl = url || defaultWsUrl;
            if (url) localStorage.setItem('todo_ws_url', wsUrl);
            else localStorage.removeItem('todo_ws_url');
            modalIsRequired = false;
            hideModal();
            if (ws) { try { ws.close(); } catch(e){} }
            connect();
        });
        document.getElementById('banner-set-name').addEventListener('click', () => showModal(true));
        userNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('modal-connect').click(); });
        modal.addEventListener('click', e => { if (e.target === modal) hideModal(); });

        applyUserState();
        connect();
        render();
        setInterval(render, 60000);
        if (!userName) setTimeout(() => showModal(true), 600);
    </script>
</body>
</html>
