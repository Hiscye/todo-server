<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代办清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #e8e3dc;
            background-image: url('https://images.unsplash.com/photo-1481277542470-605612bd2d61?w=1920&q=80&auto=format');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
            width: 100%;
            max-width: 520px;
            padding: 32px;
            position: relative;
        }

        /* 连接状态徽章 */
        .connection-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .connection-badge:hover {
            background: #edf2f7;
        }
        .connection-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e0;
            transition: background 0.2s;
        }
        .connection-badge.connected .dot {
            background: #48bb78;
            box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.2);
        }
        .connection-badge.connecting .dot {
            background: #ed8936;
            animation: pulse 1.2s infinite;
        }
        .connection-badge.disconnected .dot {
            background: #e53e3e;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        #todo-input {
            flex: 1;
            min-width: 160px;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        #todo-input:focus {
            border-color: #667eea;
        }

        #todo-input:disabled {
            background: #f7fafc;
            cursor: not-allowed;
        }

        #due-input {
            padding: 12px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #4a5568;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
            outline: none;
            min-width: 140px;
        }

        #due-input:focus {
            border-color: #667eea;
        }

        #due-input:disabled {
            background: #f7fafc;
            cursor: not-allowed;
        }

        #due-input.has-value {
            border-color: #cbd5e0;
        }

        /* 优先级选择器 */
        .priority-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            align-items: center;
        }
        .priority-selector label {
            font-size: 12px;
            color: #718096;
            margin-right: 4px;
        }
        .priority-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border: 2px solid transparent;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.15s;
            color: #4a5568;
            font-family: inherit;
        }
        .priority-btn .p-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .priority-btn.p-high .p-dot { background: #f56565; }
        .priority-btn.p-medium .p-dot { background: #ed8936; }
        .priority-btn.p-low .p-dot { background: #48bb78; }
        .priority-btn.p-none .p-dot {
            background: transparent;
            border: 1px dashed #cbd5e0;
        }
        .priority-btn:hover {
            background: #f7fafc;
        }
        .priority-btn.active {
            background: #edf2f7;
            border-color: currentColor;
            font-weight: 600;
        }
        .priority-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .priority-btn.p-high.active { color: #c53030; }
        .priority-btn.p-medium.active { color: #c05621; }
        .priority-btn.p-low.active { color: #276749; }
        .priority-btn.p-none.active { color: #4a5568; }

        .input-hint {
            font-size: 11px;
            color: #a0aec0;
            margin-top: -16px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        #add-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        #add-btn:hover:not(:disabled) {
            background: #5568d3;
        }

        #add-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        #add-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #4a5568;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-btn {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #4a5568;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        #todo-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        #todo-list::-webkit-scrollbar {
            width: 6px;
        }

        #todo-list::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 优先级左侧色条 */
        .todo-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: transparent;
            transition: background 0.2s;
        }
        .todo-item.priority-high::before { background: #f56565; }
        .todo-item.priority-medium::before { background: #ed8936; }
        .todo-item.priority-low::before { background: #48bb78; }

        .todo-item.priority-high {
            background: #fff5f5;
        }
        .todo-item.priority-medium {
            background: #fffaf0;
        }
        .todo-item.priority-low {
            background: #f0fff4;
        }
        .todo-item.priority-high:hover { background: #fed7d7; }
        .todo-item.priority-medium:hover { background: #feebc8; }
        .todo-item.priority-low:hover { background: #c6f6d5; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item:hover {
            background: #edf2f7;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #a0aec0;
        }

        .todo-item.completed .todo-due {
            opacity: 0.5;
        }

        .todo-item.completed::before {
            opacity: 0.4;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .todo-text {
            display: block;
            color: #2d3748;
            font-size: 15px;
            word-break: break-word;
        }

        .todo-due {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }
        .todo-due:hover {
            opacity: 0.75;
        }
        .todo-due .due-icon {
            font-size: 13px;
        }
        .todo-due .due-edit {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 0;
            height: 0;
        }

        /* 状态颜色 */
        .todo-due.overdue {
            background: #fed7d7;
            color: #c53030;
            font-weight: 600;
        }
        .todo-due.today {
            background: #feebc8;
            color: #c05621;
            font-weight: 600;
            animation: pulseDue 2s infinite;
        }
        .todo-due.soon {
            background: #fefcbf;
            color: #975a16;
        }
        .todo-due.upcoming {
            background: #c6f6d5;
            color: #276749;
        }
        .todo-due.future {
            color: #718096;
            background: transparent;
            padding-left: 0;
        }
        @keyframes pulseDue {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .todo-due.no-date {
            color: #cbd5e0;
            background: transparent;
            font-size: 11px;
        }
        .todo-due.no-date:hover {
            color: #667eea;
        }

        /* 优先级徽章 */
        .todo-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .todo-priority {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .todo-priority:hover { opacity: 0.75; }
        .todo-priority .p-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .todo-priority.high { background: #fed7d7; color: #c53030; }
        .todo-priority.high .p-dot { background: #f56565; }
        .todo-priority.medium { background: #feebc8; color: #c05621; }
        .todo-priority.medium .p-dot { background: #ed8936; }
        .todo-priority.low { background: #c6f6d5; color: #276749; }
        .todo-priority.low .p-dot { background: #48bb78; }
        .todo-priority.none {
            color: #cbd5e0;
            background: transparent;
            font-weight: normal;
        }
        .todo-priority.none:hover { color: #667eea; }

        /* 用户识别 - 头像 + 名字 */
        .todo-author {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 6px 2px 2px;
            font-size: 11px;
            color: #4a5568;
            background: #edf2f7;
            border-radius: 10px;
        }
        .todo-author .avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .todo-author.completed {
            background: #c6f6d5;
            color: #276749;
        }
        .todo-author.completed .avatar {
            background: #48bb78;
        }
        .todo-author .author-time {
            color: #a0aec0;
            font-size: 10px;
        }
        .todo-author.completed .author-time {
            color: #68d391;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #fed7d7;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
            font-size: 14px;
        }

        .empty-state::before {
            content: "📝";
            display: block;
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* 设置弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h3 {
            margin-bottom: 12px;
            color: #2d3748;
            font-size: 18px;
        }
        .modal p {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .modal p code {
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #2b6cb0;
        }
        .modal input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        .modal input:focus {
            border-color: #667eea;
        }
        .settings-section {
            margin-bottom: 18px;
        }
        .settings-section .settings-label {
            display: block;
            color: #2d3748;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .settings-section p {
            margin-bottom: 8px;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 8px 18px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn.primary {
            background: #667eea;
            color: white;
        }
        .modal-btn.primary:hover {
            background: #5568d3;
        }
        .modal-btn.secondary {
            background: #edf2f7;
            color: #4a5568;
        }
        .modal-btn.secondary:hover {
            background: #e2e8f0;
        }

        /* 强制实名模式样式 */
        .modal-overlay.required .modal {
            border: 2px solid #f56565;
        }
        .modal-overlay.required .modal h3::after {
            content: ' *必填';
            color: #f56565;
            font-size: 13px;
            font-weight: normal;
        }
        .modal.required-mode .modal-btn.secondary {
            display: none;
        }

        /* 匿名模式 - 添加区域被锁定 */
        .input-area.locked,
        .priority-selector.locked {
            opacity: 0.4;
            pointer-events: none;
            position: relative;
        }
        .name-required-banner {
            display: none;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
        .name-required-banner.show {
            display: block;
        }
        .name-required-banner button {
            background: #f56565;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            margin-left: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .name-required-banner button:hover {
            background: #e53e3e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="connection-badge connecting" id="conn-badge" title="点击设置服务器地址">
            <span class="dot"></span>
            <span class="text" id="conn-text">连接中...</span>
        </div>

        <h1>📋 代办清单</h1>
        <p class="subtitle">把要做的事记下来，<span id="online-text">一起搞定它</span></p>

        <div class="name-required-banner" id="name-banner">
            ⚠️ 请先设置你的名字才能添加任务
            <button id="banner-set-name">立即设置</button>
        </div>

        <div class="input-area" id="input-area">
            <input
                type="text"
                id="todo-input"
                placeholder="输入新任务，回车添加..."
                maxlength="200"
                disabled
            >
            <input
                type="date"
                id="due-input"
                disabled
                aria-label="截止日期"
            >
            <button id="add-btn" disabled>添加</button>
        </div>

        <div class="priority-selector" id="priority-selector">
            <label>优先级：</label>
            <button type="button" class="priority-btn p-high" data-priority="high" disabled>
                <span class="p-dot"></span>高
            </button>
            <button type="button" class="priority-btn p-medium" data-priority="medium" disabled>
                <span class="p-dot"></span>中
            </button>
            <button type="button" class="priority-btn p-low" data-priority="low" disabled>
                <span class="p-dot"></span>低
            </button>
            <button type="button" class="priority-btn p-none active" data-priority="none" disabled>
                <span class="p-dot"></span>无
            </button>
        </div>

        <div class="input-hint">💡 日期和优先级都可选，点击任务上的标签可随时修改</div>

        <div class="stats">
            <span>总计：<strong id="total-count">0</strong></span>
            <span>已完成：<strong id="done-count">0</strong></span>
            <span>未完成：<strong id="pending-count">0</strong></span>
            <span>在线：<strong id="online-count">0</strong></span>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">未完成</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙ 设置</h3>

            <div class="settings-section">
                <label class="settings-label">👤 你的名字</label>
                <p style="font-size: 12px; color: #718096;">
                    会显示在「添加者 / 完成者」上，方便别人知道是谁做的
                </p>
                <input
                    type="text"
                    id="user-name-input"
                    placeholder="例如：小明 / Alice"
                    maxlength="20"
                >
            </div>

            <div class="settings-section">
                <label class="settings-label">🌐 服务器地址</label>
                <p style="font-size: 12px; color: #718096;">
                    默认同源地址：<code id="default-url-hint"></code>
                </p>
                <input
                    type="text"
                    id="ws-url-input"
                    placeholder="留空使用同源地址"
                >
            </div>

            <div class="modal-actions">
                <button class="modal-btn secondary" id="modal-cancel">取消</button>
                <button class="modal-btn primary" id="modal-connect">保存</button>
            </div>
            <p id="required-hint" style="display:none; font-size: 12px; color: #e53e3e; margin-top: -8px; margin-bottom: 8px;">
                ⚠️ 必须填写名字才能使用
            </p>
        </div>
    </div>

    <script>
        // ====== 全局状态 ======
        let todos = [];
        let currentFilter = 'all';
        let ws = null;
        // 默认使用同源地址（同域名、同端口），用户可在设置中手动覆盖
        const defaultWsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
        let wsUrl = localStorage.getItem('todo_ws_url') || defaultWsUrl;
        let onlineCount = 0;
        let reconnectTimer = null;
        let userId = localStorage.getItem('todo_user_id');
        if (!userId) {
            userId = 'user-' + Math.random().toString(36).slice(2, 8);
            localStorage.setItem('todo_user_id', userId);
        }
        let userName = localStorage.getItem('todo_user_name') || '';

        // 给每个 userId 生成固定颜色和首字母（用于头像）
        function hashCode(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) h = (h << 5) - h + str.charCodeAt(i) | 0;
            return Math.abs(h);
        }
        const AVATAR_COLORS = [
            '#f56565', '#ed8936', '#ecc94b', '#48bb78', '#38b2ac',
            '#4299e1', '#667eea', '#9f7aea', '#ed64a6', '#a0aec0'
        ];
        function getUserColor(id) {
            if (!id) return '#a0aec0';
            return AVATAR_COLORS[hashCode(id) % AVATAR_COLORS.length];
        }
        function getInitial(name, id) {
            if (name && name.trim()) return name.trim()[0].toUpperCase();
            if (id) return id[0].toUpperCase();
            return '?';
        }
        function formatRelativeTime(isoStr) {
            if (!isoStr) return '';
            const diff = Date.now() - new Date(isoStr).getTime();
            const min = Math.floor(diff / 60000);
            if (min < 1) return '刚刚';
            if (min < 60) return min + '分钟前';
            const hr = Math.floor(min / 60);
            if (hr < 24) return hr + '小时前';
            const day = Math.floor(hr / 24);
            if (day < 7) return day + '天前';
            return new Date(isoStr).toLocaleDateString('zh-CN');
        }

        // ====== DOM 引用 ======
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const dueInput = document.getElementById('due-input');
        const priorityBtns = document.querySelectorAll('.priority-btn');
        const list = document.getElementById('todo-list');
        const totalCount = document.getElementById('total-count');
        const doneCount = document.getElementById('done-count');
        const pendingCount = document.getElementById('pending-count');
        const onlineCountEl = document.getElementById('online-count');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const connBadge = document.getElementById('conn-badge');
        const connText = document.getElementById('conn-text');
        const onlineText = document.getElementById('online-text');
        const modal = document.getElementById('settings-modal');
        const wsUrlInput = document.getElementById('ws-url-input');
        const userNameInput = document.getElementById('user-name-input');
        const modalConnect = document.getElementById('modal-connect');
        const modalCancel = document.getElementById('modal-cancel');

        // 截止日期状态计算
        function getDueStatus(dueDate) {
            if (!dueDate) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const due = new Date(dueDate + 'T00:00:00');
            if (isNaN(due.getTime())) return null;
            const diffDays = Math.round((due - today) / (1000 * 60 * 60 * 24));
            if (diffDays < 0)  return { cls: 'overdue',  icon: '⚠',  text: `已过期 ${-diffDays} 天` };
            if (diffDays === 0) return { cls: 'today',    icon: '🔥', text: '今天到期' };
            if (diffDays === 1) return { cls: 'soon',     icon: '⏰', text: '明天到期' };
            if (diffDays <= 3)  return { cls: 'soon',     icon: '⏰', text: `${diffDays} 天后到期` };
            if (diffDays <= 7)  return { cls: 'upcoming', icon: '📅', text: `${diffDays} 天后到期` };
            const m = due.getMonth() + 1;
            const d = due.getDate();
            return { cls: 'future', icon: '📅', text: `${m}月${d}日到期` };
        }

        const PRIORITY_MAP = {
            high:   { cls: 'high',   icon: '🔴', text: '高' },
            medium: { cls: 'medium', icon: '🟡', text: '中' },
            low:    { cls: 'low',    icon: '🟢', text: '低' }
        };
        let selectedPriority = null;  // 当前在添加表单中选中的优先级

        function getPriorityBadge(p) {
            const info = PRIORITY_MAP[p];
            if (!info) {
                return `<span class="todo-priority none" data-action="cycle-priority" title="点击设置优先级">＋ 优先级</span>`;
            }
            return `<span class="todo-priority ${info.cls}" data-action="cycle-priority" title="点击修改优先级">${info.icon} ${info.text}</span>`;
        }

        // ====== WebSocket 连接 ======
        function setStatus(status, text) {
            connBadge.classList.remove('connected', 'connecting', 'disconnected');
            connBadge.classList.add(status);
            connText.textContent = text;
            input.placeholder = (status === 'connected')
                ? '输入新任务，回车添加...'
                : '未连接到服务器，点击右上角徽章设置';
            applyUserState();
        }

        function connect() {
            // 自动把 https:// 转成 wss://
            let url = (wsUrl || defaultWsUrl).trim();
            if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
            else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);

            setStatus('connecting', '连接中...');
            clearTimeout(reconnectTimer);

            try {
                ws = new WebSocket(url);
            } catch (e) {
                setStatus('disconnected', '连接失败');
                scheduleReconnect();
                return;
            }

            ws.onopen = () => {
                console.log('✓ 已连接到服务器');
                setStatus('connected', '已连接');
                // 首次连接时打个招呼，方便服务器日志看到不同用户
                send({ type: 'hello', user: userId });
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleServerMessage(msg);
                } catch (e) {
                    console.error('消息解析失败', e);
                }
            };

            ws.onerror = (err) => {
                console.error('WebSocket 错误', err);
            };

            ws.onclose = () => {
                console.log('✗ 与服务器断开');
                setStatus('disconnected', '已断开');
                onlineCount = 0;
                onlineCountEl.textContent = '0';
                scheduleReconnect();
            };
        }

        function scheduleReconnect() {
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => {
                console.log('尝试重新连接...');
                connect();
            }, 3000);
        }

        function send(msg) {
            // 自动附加用户身份信息
            const enriched = { ...msg, user: userId, userName: userName };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(enriched));
                return true;
            }
            return false;
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'state':
                    todos = Array.isArray(msg.todos) ? msg.todos : [];
                    render();
                    break;
                case 'added':
                    if (!todos.some(t => t.id === msg.todo.id)) {
                        todos.push(msg.todo);
                        render();
                    }
                    break;
                case 'updated':
                    {
                        const idx = todos.findIndex(t => t.id === msg.todo.id);
                        if (idx >= 0) {
                            todos[idx] = msg.todo;
                            render();
                        }
                    }
                    break;
                case 'deleted':
                    todos = todos.filter(t => t.id !== msg.id);
                    render();
                    break;
                case 'cleared':
                    todos = [];
                    render();
                    break;
                case 'online':
                    onlineCount = msg.count;
                    onlineCountEl.textContent = String(msg.count);
                    onlineText.textContent = msg.count > 1
                        ? `和 ${msg.count - 1} 个人一起搞定`
                        : '把要做的事记下来';
                    break;
            }
        }

        // ====== 渲染 ======
        function updateStats() {
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            totalCount.textContent = total;
            doneCount.textContent = done;
            pendingCount.textContent = total - done;
        }

        function renderAuthor(todo) {
            // 已完成的任务显示「完成者」，否则显示「添加者」
            const id = todo.completed && todo.completedBy ? todo.completedBy : todo.createdBy;
            const name = todo.completed && todo.completedByName ? todo.completedByName : todo.createdByName;
            const time = todo.completed && todo.completedAt ? todo.completedAt : todo.createdAt;
            const role = todo.completed ? '完成' : '添加';
            if (!id && !name) return '';
            const initial = getInitial(name, id);
            const color = getUserColor(id || name);
            const displayName = name || '匿名';
            const timeText = formatRelativeTime(time);
            return `<span class="todo-author ${todo.completed ? 'completed' : ''}" title="${role}者">
                <span class="avatar" style="background:${color}">${escapeHtml(initial)}</span>
                ${escapeHtml(displayName)}<span class="author-time"> · ${timeText}</span>
            </span>`;
        }

        function render() {
            const filtered = todos.filter(t => {
                if (currentFilter === 'pending') return !t.completed;
                if (currentFilter === 'completed') return t.completed;
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">还没有任务，添加一个吧～</div>';
            } else {
                list.innerHTML = filtered.map(todo => {
                    const due = getDueStatus(todo.dueDate);
                    const dueHtml = due
                        ? `<span class="todo-due ${due.cls}" data-action="edit-due" title="点击修改日期">${due.icon} ${escapeHtml(due.text)}</span>`
                        : `<span class="todo-due no-date" data-action="edit-due" title="点击设置截止日期">📅 添加日期</span>`;
                    const priorityCls = todo.priority ? `priority-${todo.priority}` : '';
                    const authorHtml = renderAuthor(todo);
                    return `
                    <li class="todo-item ${todo.completed ? 'completed' : ''} ${priorityCls}" data-id="${escapeAttr(todo.id)}">
                        <input
                            type="checkbox"
                            class="todo-checkbox"
                            ${todo.completed ? 'checked' : ''}
                        >
                        <div class="todo-content">
                            <span class="todo-text">${escapeHtml(todo.text)}</span>
                            <div class="todo-meta">
                                ${authorHtml}
                                ${getPriorityBadge(todo.priority)}
                                ${dueHtml}
                            </div>
                        </div>
                        <button class="delete-btn" title="删除">✕</button>
                    </li>
                `;
                }).join('');
            }
            updateStats();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function escapeAttr(str) {
            return String(str).replace(/"/g, '&quot;');
        }

        // ====== 用户操作（通过 WebSocket 发送） ======
        // 所有 send 调用都附加 userId + userName，让服务器知道是谁做的
        function addTodo() {
            const text = input.value.trim();
            if (!text) return;
            const dueDate = dueInput.value || null;
            const priority = selectedPriority;
            if (send({ type: 'add', text, dueDate, priority, user: userId, userName: userName })) {
                input.value = '';
                dueInput.value = '';
                dueInput.classList.remove('has-value');
                // 重置优先级选择
                selectedPriority = null;
                priorityBtns.forEach(b => b.classList.toggle('active', b.dataset.priority === 'none'));
            }
        }

        // 优先级按钮点击（添加表单）
        priorityBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.disabled) return;
                const p = btn.dataset.priority;
                selectedPriority = p === 'none' ? null : p;
                priorityBtns.forEach(b => b.classList.toggle('active', b === btn));
            });
        });

        list.addEventListener('click', (e) => {
            const item = e.target.closest('.todo-item');
            if (!item) return;
            const id = item.dataset.id;

            if (e.target.classList.contains('todo-checkbox')) {
                send({ type: 'update', id, updates: { completed: e.target.checked }, user: userId, userName: userName });
            } else if (e.target.classList.contains('delete-btn')) {
                send({ type: 'delete', id, user: userId, userName: userName });
            } else if (e.target.closest('[data-action="edit-due"]')) {
                openDueEditor(id, e.target.closest('[data-action="edit-due"]'));
            } else if (e.target.closest('[data-action="cycle-priority"]')) {
                cyclePriority(id);
            }
        });

        // 点击优先级徽章 → 循环切换 高 → 中 → 低 → 无
        function cyclePriority(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            const order = [null, 'low', 'medium', 'high'];
            const idx = order.indexOf(todo.priority || null);
            const next = order[(idx + 1) % order.length];
            send({ type: 'update', id, updates: { priority: next }, user: userId, userName: userName });
        }

        // 点击日期 → 弹出隐藏的 date 选择器
        function openDueEditor(id, el) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            // 创建一个临时 date input
            const existing = el.querySelector('input.due-edit');
            if (existing) { existing.click(); return; }
            const tmp = document.createElement('input');
            tmp.type = 'date';
            tmp.className = 'due-edit';
            tmp.value = todo.dueDate || '';
            tmp.style.cssText = 'position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;';
            el.style.position = 'relative';
            el.appendChild(tmp);
            // 触发原生选择器
            const cleanup = () => {
                if (tmp.parentNode) tmp.parentNode.removeChild(tmp);
            };
            tmp.addEventListener('change', () => {
                const newVal = tmp.value || null;
                cleanup();
                if (newVal !== (todo.dueDate || null)) {
                    send({ type: 'update', id, updates: { dueDate: newVal }, user: userId, userName: userName });
                }
            });
            tmp.addEventListener('blur', () => setTimeout(cleanup, 200));
            setTimeout(() => tmp.showPicker ? tmp.showPicker() : tmp.click(), 50);
        }

        addBtn.addEventListener('click', addTodo);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTodo();
        });
        dueInput.addEventListener('input', () => {
            dueInput.classList.toggle('has-value', !!dueInput.value);
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // ====== 设置弹窗 ======
        let modalIsRequired = false;

        function applyUserState() {
            const banner = document.getElementById('name-banner');
            const inputArea = document.getElementById('input-area');
            const prioritySelector = document.getElementById('priority-selector');
            const hasName = !!(userName && userName.trim());
            const online = ws && ws.readyState === WebSocket.OPEN;

            if (hasName) {
                banner.classList.remove('show');
                inputArea.classList.remove('locked');
                prioritySelector.classList.remove('locked');
                input.disabled = !online;
                addBtn.disabled = !online;
                dueInput.disabled = !online;
                priorityBtns.forEach(b => b.disabled = !online);
            } else {
                banner.classList.add('show');
                inputArea.classList.add('locked');
                prioritySelector.classList.add('locked');
                input.disabled = true;
                addBtn.disabled = true;
                dueInput.disabled = true;
                priorityBtns.forEach(b => b.disabled = true);
            }
        }

        function showModal(required = false) {
            modalIsRequired = required;
            userNameInput.value = userName || '';
            wsUrlInput.value = (wsUrl === defaultWsUrl ? '' : wsUrl);
            const hint = document.getElementById('default-url-hint');
            if (hint) hint.textContent = defaultWsUrl;
            const requiredHint = document.getElementById('required-hint');
            const cancelBtn = document.getElementById('modal-cancel');
            if (required) {
                modal.classList.add('required');
                modal.classList.add('required-mode');
                if (requiredHint) requiredHint.style.display = 'block';
                if (cancelBtn) cancelBtn.style.display = 'none';
            } else {
                modal.classList.remove('required');
                modal.classList.remove('required-mode');
                if (requiredHint) requiredHint.style.display = 'none';
                if (cancelBtn) cancelBtn.style.display = '';
            }
            modal.classList.add('active');
            setTimeout(() => userNameInput.focus(), 50);
        }
        function hideModal() {
            if (modalIsRequired) return;
            modal.classList.remove('active');
        }

        connBadge.addEventListener('click', () => showModal(false));
        modalCancel.addEventListener('click', hideModal);
        modalConnect.addEventListener('click', () => {
            const newName = userNameInput.value.trim();
            if (modalIsRequired && !newName) {
                userNameInput.focus();
                userNameInput.style.borderColor = '#f56565';
                setTimeout(() => userNameInput.style.borderColor = '', 1500);
                return;
            }
            if (newName !== userName) {
                userName = newName;
                if (newName) {
                    localStorage.setItem('todo_user_name', userName);
                } else {
                    localStorage.removeItem('todo_user_name');
                }
                applyUserState();
            }
            const url = wsUrlInput.value.trim();
            wsUrl = url || defaultWsUrl;
            if (url) {
                localStorage.setItem('todo_ws_url', wsUrl);
            } else {
                localStorage.removeItem('todo_ws_url');
            }
            modalIsRequired = false;
            hideModal();
            if (ws) { try { ws.close(); } catch(e){} }
            connect();
        });
        userNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') modalConnect.click();
        });
        wsUrlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') modalConnect.click();
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) hideModal();
        });
        document.getElementById('banner-set-name').addEventListener('click', () => {
            showModal(true);
        });

        // ====== 启动 ======
        applyUserState();
        connect();
        render();
        setInterval(render, 60 * 1000);
        // 第一次访问时，如果没设置名字，强制弹出设置窗口（必填模式）
        if (!userName) {
            setTimeout(() => showModal(true), 600);
        }
    </script>
</body>
</html>
